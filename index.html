<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel 自动统计分析 v6</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/docx@8/build/index.js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #eef2ff;
      --success: #059669;
      --success-light: #ecfdf5;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --warning: #d97706;
      --warning-light: #fffbeb;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.04);
      --shadow-lg: 0 10px 15px rgba(0,0,0,.08), 0 4px 6px rgba(0,0,0,.04);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: .2s ease;
    }
    [data-theme="dark"] {
      color-scheme: dark;
      background: #0f172a;
      color: #e2e8f0;
      --primary: #818cf8;
      --primary-hover: #6366f1;
      --primary-light: #1e1b4b;
      --success: #34d399;
      --success-light: #064e3b;
      --danger: #f87171;
      --danger-light: #7f1d1d;
      --warning: #fbbf24;
      --warning-light: #78350f;
      --gray-50: #1e293b;
      --gray-100: #334155;
      --gray-200: #475569;
      --gray-300: #64748b;
      --gray-400: #94a3b8;
      --gray-500: #cbd5e1;
      --gray-600: #e2e8f0;
      --gray-700: #f1f5f9;
      --gray-800: #f8fafc;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
      --shadow: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
      --shadow-md: 0 4px 6px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.3);
      --shadow-lg: 0 10px 15px rgba(0,0,0,.5), 0 4px 6px rgba(0,0,0,.3);
    }
    [data-theme="dark"] body { background: #0f172a; color: #e2e8f0; }
    [data-theme="dark"] .app-header { background: linear-gradient(135deg,#312e81,#4c1d95); }
    [data-theme="dark"] .panel { background: #1e293b; border-color: #334155; }
    [data-theme="dark"] input[type=text], [data-theme="dark"] input[type=number], [data-theme="dark"] select, [data-theme="dark"] textarea { background: #0f172a; color: #e2e8f0; border-color: #475569; }
    [data-theme="dark"] .upload-zone { background: #1e293b; border-color: #475569; }
    [data-theme="dark"] .table-wrapper th { background: #334155; color: #e2e8f0; }
    [data-theme="dark"] .table-wrapper td { color: #cbd5e1; }
    [data-theme="dark"] .table-wrapper tbody tr:nth-child(2n) { background: #1e293b; }
    [data-theme="dark"] .table-wrapper tbody tr:hover { background: #312e81; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }

    .app-shell { max-width: 1120px; margin: 0 auto; padding: 28px 24px 48px; }
    .app-header { text-align: center; margin-bottom: 32px; padding: 32px 24px; background: linear-gradient(135deg,#4f46e5,#7c3aed); border-radius: 20px; color: #fff; box-shadow: var(--shadow-lg); }
    .app-header h1 { margin: 0 0 8px; font-size: 1.75rem; font-weight: 700; letter-spacing: -.02em; }
    .app-header p { margin: 0; font-size: .95rem; opacity: .9; }

    .panel { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); transition: box-shadow var(--transition); }
    .panel:hover { box-shadow: var(--shadow-md); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; -webkit-user-select: none; user-select: none; }
    .panel-header h2 { margin: 0; font-size: 1.05rem; font-weight: 600; color: var(--gray-800); display: flex; align-items: center; gap: 8px; }
    .panel-header .step-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: var(--primary); color: #fff; font-size: .75rem; font-weight: 700; flex-shrink: 0; }
    .panel-header .collapse-icon { color: var(--gray-400); font-size: 1.2rem; transition: transform var(--transition); }
    .panel-header .collapse-icon.collapsed { transform: rotate(-90deg); }
    .panel-body { margin-top: 16px; overflow: hidden; transition: max-height .25s ease, opacity .2s ease; max-height: 4000px; opacity: 1; }
    .panel-body.hidden { max-height: 0; opacity: 0; margin-top: 0; padding-top: 0; }

    .upload-zone { border: 2px dashed var(--gray-300); border-radius: var(--radius); padding: 36px 24px; text-align: center; cursor: pointer; transition: all var(--transition); background: var(--gray-50); }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--primary); background: var(--primary-light); }
    .upload-zone .upload-icon { font-size: 2.5rem; margin-bottom: 12px; color: var(--gray-400); line-height: 1; }
    .upload-zone:hover .upload-icon, .upload-zone.drag-over .upload-icon { color: var(--primary); }
    .upload-zone .upload-text { font-weight: 600; color: var(--gray-700); margin-bottom: 4px; }
    .upload-zone .upload-hint { font-size: .85rem; color: var(--gray-400); }
    .upload-zone input[type=file] { display: none; }

    .file-info { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--success-light); border: 1px solid #a7f3d0; border-radius: var(--radius-sm); margin-bottom: 16px; }
    .file-info .file-icon { font-size: 1.5rem; line-height: 1; }
    .file-info .file-name { font-weight: 600; color: var(--gray-800); flex: 1; }
    .file-info .file-size { font-size: .85rem; color: var(--gray-500); }
    .file-info .file-remove { background: none; border: none; color: var(--gray-400); cursor: pointer; padding: 4px 8px; border-radius: 6px; font-size: 1.1rem; transition: all var(--transition); }
    .file-info .file-remove:hover { background: var(--danger-light); color: var(--danger); }

    .sheet-tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
    .sheet-tab { padding: 8px 16px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); background: var(--gray-50); cursor: pointer; font-size: .85rem; font-weight: 500; color: var(--gray-600); transition: all var(--transition); }
    .sheet-tab:hover { border-color: var(--primary); color: var(--primary); }
    .sheet-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .table-wrapper { overflow-x: auto; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); max-height: 400px; overflow-y: auto; }
    .table-wrapper table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .table-wrapper thead { position: sticky; top: 0; z-index: 1; }
    .table-wrapper th { background: var(--gray-100); color: var(--gray-700); font-weight: 600; padding: 10px 12px; text-align: left; border-bottom: 2px solid var(--gray-200); white-space: nowrap; }
    .table-wrapper td { padding: 8px 12px; border-bottom: 1px solid var(--gray-100); color: var(--gray-600); white-space: nowrap; }
    .table-wrapper tbody tr:hover { background: var(--primary-light); }
    .table-wrapper tbody tr:nth-child(2n) { background: var(--gray-50); }
    .table-wrapper tbody tr:nth-child(2n):hover { background: var(--primary-light); }

    .form-row { display: grid; gap: 8px; margin-bottom: 16px; }
    .form-row label { font-weight: 600; font-size: .9rem; color: var(--gray-700); }
    .form-row label .label-hint { font-weight: 400; color: var(--gray-400); font-size: .8rem; }

    input[type=text], input[type=number], select, textarea {
      width: 100%; padding: 10px 14px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
      font-size: .9rem; font-family: inherit; background: #fff; color: var(--gray-800);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    input[type=text]:focus, input[type=number]:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px #4f46e51f;
    }
    textarea { resize: vertical; min-height: 60px; }
    select[multiple] { min-height: 120px; }

    .grid-two { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px; }
    .grid-three { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; }
    .grid-four { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }

    .badge-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge-list span { display: inline-flex; align-items: center; gap: 4px; background: var(--primary-light); color: var(--primary); padding: 4px 10px; border-radius: 9999px; font-size: .8rem; font-weight: 500; }
    .badge-list span.badge-numeric:before { content: "#"; font-weight: 700; opacity: .6; }
    .badge-list span.badge-categorical:before { content: "■"; font-weight: 700; opacity: .6; }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border: none; border-radius: var(--radius-sm); font-size: .9rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: all var(--transition); text-decoration: none; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover:not(:disabled) { background: #047857; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #b91c1c; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-outline { background: transparent; color: var(--gray-600); border: 1px solid var(--gray-300); }
    .btn-outline:hover:not(:disabled) { background: var(--gray-50); border-color: var(--gray-400); }
    .btn-sm { padding: 6px 14px; font-size: .8rem; }
    .btn-ai { background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; border: none; }
    .btn-ai:hover:not(:disabled) { background: linear-gradient(135deg,#4f46e5,#7c3aed); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-ai-active { background: linear-gradient(135deg,#059669,#10b981); color: #fff; }
    .btn-ai-active:hover:not(:disabled) { background: linear-gradient(135deg,#047857,#059669); transform: translateY(-1px); box-shadow: var(--shadow-md); }

    .actions { display: flex; gap: 12px; flex-wrap: wrap; }

    .result-container pre { white-space: pre-wrap; word-break: break-word; background: #1e1e2e; color: #cdd6f4; border-radius: var(--radius-sm); padding: 20px; min-height: 160px; border: 1px solid var(--gray-200); font-size: .85rem; line-height: 1.6; margin: 0; font-family: JetBrains Mono, Fira Code, Consolas, monospace; }
    .result-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 160px; background: var(--gray-50); border: 1px dashed var(--gray-300); border-radius: var(--radius-sm); color: var(--gray-400); gap: 8px; }
    .result-placeholder .placeholder-icon { font-size: 2rem; opacity: .5; }
    .result-placeholder .placeholder-text { font-size: .9rem; }
    .result-toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .result-container { position: relative; }

    .ai-config-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; justify-content: flex-end; }
    .ai-status-ok { font-size: .8rem; color: var(--success); font-weight: 500; }
    .ai-config-panel { border: 1px solid #c4b5fd; background: #f5f3ff; }
    .ai-config-hint { font-size: .8rem; color: var(--gray-500); margin-top: 8px; line-height: 1.5; }
    .ai-config-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .label-with-action { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .label-with-action label { margin-bottom: 0; }
    .ai-interpretation { margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--gray-200); }
    .ai-interp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-weight: 600; font-size: .95rem; color: var(--gray-700); }
    .ai-interp-content { white-space: pre-wrap; word-break: break-word; background: #1e1e2e; color: #a5f3fc; border-radius: var(--radius-sm); padding: 20px; min-height: 80px; border: 1px solid var(--gray-200); font-size: .85rem; line-height: 1.7; margin: 0; font-family: JetBrains Mono, Fira Code, Consolas, monospace; }

    .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: .88rem; display: flex; align-items: center; gap: 10px; margin-top: 12px; animation: slideIn .25s ease; }
    .alert-error { background: var(--danger-light); color: var(--danger); border: 1px solid #fecaca; }
    .alert-success { background: var(--success-light); color: var(--success); border: 1px solid #a7f3d0; }
    .alert-warning { background: var(--warning-light); color: var(--warning); border: 1px solid #fde68a; }
    .alert .alert-close { margin-left: auto; background: none; border: none; cursor: pointer; color: inherit; opacity: .6; padding: 2px 6px; border-radius: 4px; font-size: 1rem; }
    .alert .alert-close:hover { opacity: 1; }

    .loading-overlay { position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: #00000059; display: flex; align-items: center; justify-content: center; z-index: 1000; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); animation: fadeIn .2s ease; }
    .loading-card { background: #fff; border-radius: var(--radius); padding: 32px 40px; text-align: center; box-shadow: var(--shadow-lg); }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
    .loading-card .loading-text { font-weight: 600; color: var(--gray-700); font-size: .95rem; }

    .data-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 9999px; font-size: .82rem; color: var(--gray-600); }
    .stat-chip strong { color: var(--gray-800); }

    .note { text-align: center; border: 1px dashed var(--gray-300); background: var(--gray-50); }
    .note p { margin-top: 8px; color: var(--gray-500); font-size: .88rem; }

    .url-input-row { display: flex; gap: 8px; }
    .url-input-row input { flex: 1; }
    .url-input-row .btn { flex-shrink: 0; white-space: nowrap; }

    /* Data Cleaning */
    .clean-section { border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 12px; background: var(--gray-50); }
    .clean-section h3 { margin: 0 0 12px; font-size: .95rem; font-weight: 600; color: var(--gray-700); }
    .clean-missing-grid { display: grid; grid-template-columns: auto 1fr auto auto; gap: 8px; align-items: center; font-size: .85rem; }
    .clean-missing-grid .col-name { font-weight: 600; color: var(--gray-700); min-width: 80px; }
    .clean-missing-grid .missing-bar { height: 8px; background: var(--gray-200); border-radius: 4px; overflow: hidden; }
    .clean-missing-grid .missing-bar-fill { height: 100%; background: var(--warning); border-radius: 4px; transition: width .3s; }
    .clean-missing-grid .missing-count { color: var(--gray-500); min-width: 60px; text-align: right; }
    .clean-missing-grid .missing-action { min-width: 100px; }
    .outlier-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .outlier-table th { background: var(--gray-100); padding: 8px 12px; text-align: left; font-weight: 600; color: var(--gray-700); border-bottom: 1px solid var(--gray-200); }
    .outlier-table td { padding: 6px 12px; border-bottom: 1px solid var(--gray-100); color: var(--gray-600); }
    .outlier-table .outlier-val { color: var(--danger); font-weight: 600; }
    .filter-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .filter-row select, .filter-row input { width: auto; min-width: 120px; }

    /* Chart Panel */
    .chart-type-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
    .chart-type-tab { padding: 8px 16px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); background: var(--gray-50); cursor: pointer; font-size: .85rem; font-weight: 500; color: var(--gray-600); transition: all var(--transition); }
    .chart-type-tab:hover { border-color: var(--primary); color: var(--primary); }
    .chart-type-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .chart-canvas-wrapper { position: relative; width: 100%; min-height: 350px; display: flex; align-items: center; justify-content: center; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 16px; }
    .chart-canvas-wrapper canvas { max-width: 100%; max-height: 450px; }
    .heatmap-canvas { image-rendering: pixelated; }

    /* ---- NEW: Statistical Tests Panel ---- */
    .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .test-card { border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); padding: 14px; cursor: pointer; transition: all var(--transition); background: #fff; text-align: left; }
    .test-card:hover { border-color: var(--primary); box-shadow: var(--shadow); transform: translateY(-1px); }
    .test-card.selected { border-color: var(--primary); background: var(--primary-light); }
    .test-card .test-name { font-weight: 700; font-size: .9rem; color: var(--gray-800); margin-bottom: 4px; }
    .test-card .test-desc { font-size: .78rem; color: var(--gray-500); }
    .test-card .test-badge { display: inline-block; font-size: .7rem; padding: 2px 8px; border-radius: 9999px; margin-top: 6px; font-weight: 600; }
    .test-badge-param { background: #dbeafe; color: #1d4ed8; }
    .test-badge-nonparam { background: #dcfce7; color: #15803d; }
    .test-badge-categorical { background: #fef3c7; color: #92400e; }

    .test-result-box { background: #1e1e2e; border-radius: var(--radius-sm); padding: 20px; margin-top: 16px; border: 1px solid var(--gray-200); }
    .test-result-box .result-title { color: #a5f3fc; font-weight: 700; font-size: .95rem; margin-bottom: 12px; }
    .test-result-box .result-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #374151; color: #cdd6f4; font-size: .88rem; }
    .test-result-box .result-row:last-child { border-bottom: none; }
    .test-result-box .result-row .key { color: #9ca3af; }
    .test-result-box .result-row .val { font-family: monospace; color: #86efac; font-weight: 600; }
    .test-result-box .result-row .val.sig { color: #fb7185; }
    .test-result-box .result-row .val.nonsig { color: #94a3b8; }
    .test-interpretation { margin-top: 16px; padding: 16px; background: var(--success-light); border-radius: var(--radius-sm); border: 1px solid #a7f3d0; }
    .test-interpretation .interp-title { font-weight: 700; color: var(--success); margin-bottom: 8px; font-size: .9rem; }
    .test-interpretation .interp-text { font-size: .88rem; color: var(--gray-700); line-height: 1.6; }
    .effect-size-bar { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .effect-size-bar .bar-track { flex: 1; height: 8px; background: var(--gray-200); border-radius: 4px; overflow: hidden; }
    .effect-size-bar .bar-fill { height: 100%; border-radius: 4px; transition: width .5s; }

    /* ---- NEW: Data Transformation Panel ---- */
    .transform-section { border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 14px; background: var(--gray-50); }
    .transform-section h3 { margin: 0 0 10px; font-size: .95rem; font-weight: 600; color: var(--gray-700); display: flex; align-items: center; gap: 6px; }
    .transform-config { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 12px; }
    .transform-config select, .transform-config input { width: auto; min-width: 120px; }
    .transform-preview { background: #1e1e2e; border-radius: var(--radius-sm); padding: 12px; max-height: 200px; overflow: auto; }
    .transform-preview table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    .transform-preview th { color: #9ca3af; padding: 6px 10px; text-align: left; border-bottom: 1px solid #374151; font-weight: 600; white-space: nowrap; }
    .transform-preview td { color: #86efac; padding: 5px 10px; border-bottom: 1px solid #1f2937; font-family: monospace; white-space: nowrap; }
    .transform-preview .new-col { color: #a5f3fc; font-weight: 600; }
    .transform-preview .orig-col { color: #9ca3af; }
    .transform-history { margin-top: 12px; }
    .transform-history-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--gray-100); border-radius: 6px; margin-bottom: 6px; font-size: .82rem; }
    .transform-history-item .hist-label { color: var(--gray-600); font-weight: 500; }

<body>
  <div id="root"><div style="display:flex;justify-content:center;align-items:center;min-height:100vh;flex-direction:column;gap:16px;color:#6b7280;font-family:system-ui,sans-serif"><div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#4f46e5;border-radius:50%;animation:spin 0.7s linear infinite"></div><div style="font-size:16px;font-weight:500">加载中...</div></div></div>

  <script type="text/babel">
    const { useState, useMemo, useCallback, useEffect, useRef } = React;

    /* ========== 统计工具函数 ========== */
    function toNumber(v) {
      if (typeof v === 'number') return Number.isFinite(v) ? v : null;
      if (typeof v === 'string') {
        const n = Number(v.trim().replace(/,/g, ''));
        return Number.isFinite(n) ? n : null;
      }
      return null;
    }

    function mean(arr) {
      if (!arr || arr.length === 0) return NaN;
      let s = 0, c = 0;
      for (let i = 0; i < arr.length; i++) { s += arr[i]; c++; }
      return s / c;
    }

    function median(arr) {
      const sorted = [...arr].sort((a, b) => a - b);
      const mid = Math.floor(sorted.length / 2);
      return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
    }

    function mode(arr) {
      const freq = {};
      arr.forEach(v => { if (v != null) freq[v] = (freq[v] || 0) + 1; });
      let maxFreq = 0, modeVal = arr[0];
      for (const [k, v] of Object.entries(freq)) { if (v > maxFreq) { maxFreq = v; modeVal = Number(k) || k; } }
      return modeVal;
    }

    function stdev(arr) {
      if (arr.length < 2) return NaN;
      const m = mean(arr);
      return Math.sqrt(arr.reduce((s, v) => s + (v - m) ** 2, 0) / (arr.length - 1));
    }

    function quantile(arr, q) {
      const sorted = [...arr].sort((a, b) => a - b);
      const pos = (sorted.length - 1) * q;
      const base = Math.floor(pos);
      const rest = pos - base;
      if (sorted[base + 1] !== undefined) return sorted[base] + rest * (sorted[base + 1] - sorted[base]);
      return sorted[base];
    }

    function pearsonCorr(x, y) {
      if (x.length < 2) return NaN;
      const mx = mean(x), my = mean(y);
      let num = 0, dx2 = 0, dy2 = 0;
      for (let i = 0; i < x.length; i++) {
        const dx = x[i] - mx, dy = y[i] - my;
        num += dx * dy; dx2 += dx * dx; dy2 += dy * dy;
      }
      return dx2 === 0 || dy2 === 0 ? 0 : num / Math.sqrt(dx2 * dy2);
    }

    function sampleVariance(arr) {
      if (arr.length < 2) return NaN;
      const m = mean(arr);
      return arr.reduce((s, v) => s + (v - m) ** 2, 0) / (arr.length - 1);
    }

    function fmt(v) { return v == null || Number.isNaN(v) ? '-' : (typeof v === 'number' ? (Math.abs(v) < 0.0001 && v !== 0 ? v.toExponential(4) : v.toFixed(4)) : String(v)); }

    /* ========== 概率分布函数 ========== */
    // t分布CDF（两尾概率）
    function tDistCDF(t, df) {
      if (df <= 0 || !Number.isFinite(t)) return NaN;
      if (df === 1) return 0.5 + (1 / Math.PI) * Math.atan(t);
      if (df === 2) return 0.5 + (t / (2 * Math.sqrt(2 + t * t)));
      if (df === 3) {
        const s = t / Math.sqrt(3 + t * t);
        return 0.5 + (s + Math.atan(s)) / Math.PI;
      }
      // 正则化不完全Beta函数近似
      const x = df / (df + t * t);
      const a = df / 2, b = 0.5;
      return 1 - 0.5 * incompleteBeta(x, a, b);
    }

    function incompleteBeta(x, a, b) {
      // 连分数近似 (ACM Algorithm 395)
      if (x < 0 || x > 1) return NaN;
      if (x === 0) return 0;
      if (x === 1) return 1;
      const lnBeta = logGamma(a) + logGamma(b) - logGamma(a + b);
      const front = Math.exp(Math.log(x) * a + Math.log(1 - x) * b - lnBeta) / a;
      // Lentz迭代
      let f = 1, c = 1, d = 0;
      for (let n = 1; n <= 200; n++) {
        let m = Math.floor(n / 2);
        let numerator;
        if (n % 2 === 0) {
          numerator = (m * (b - m) * x) / ((a + 2 * m - 1) * (a + 2 * m));
        } else {
          numerator = -((a + m) * (a + b + m) * x) / ((a + 2 * m) * (a + 2 * m + 1));
        }
        d = 1 + numerator * d;
        if (Math.abs(d) < 1e-30) d = 1e-30;
        d = 1 / d;
        c = 1 + numerator / c;
        if (Math.abs(c) < 1e-30) c = 1e-30;
        const delta = d * c;
        f *= delta;
        if (Math.abs(delta - 1) < 1e-12) break;
      }
      return front * (f - 1);
    }

    function logGamma(x) {
      const c = [76.18009172947146, -86.50532032941677, 24.01409824083091, -1.231739572450055, 0.1208650973866179e-2, -0.5395239324951e-5];
      let y = x;
      const tmp = x + 5.5;
      const ser = c.reduce((s, v, i) => s + v / (++y), 1);
      return Math.sqrt(2 * Math.PI) * Math.pow(tmp, x + 0.5) * Math.exp(-tmp) * ser;
    }

    // 双尾 p 值
    function tTwoTailP(t, df) { return 2 * (1 - tDistCDF(Math.abs(t), df)); }

    // χ² 分布CDF近似
    function chiSquareCDF(x, df) {
      if (x <= 0) return 0;
      if (df <= 0) return NaN;
      // Wilson-Hilferty近似
      const z = Math.pow(x / df, 1 / 3) - (1 - 2 / (9 * df));
      const se = Math.sqrt(2 / (9 * df));
      return normalCDF(z / se);
    }

    function normalCDF(z) {
      const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741, a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
      const sign = z < 0 ? -1 : 1;
      z = Math.abs(z) / Math.sqrt(2);
      const t = 1 / (1 + p * z);
      return 0.5 * (1 + sign * (1 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-z * z)));
    }

    function chiSquareTwoTailP(x, df) { return 1 - chiSquareCDF(x, df); }

    // Kolmogorov-Smirnov近似（用于非参数检验）
    function ksProb(lam) {
      if (lam < 1) return Math.pow(Math.E, -Math.PI * Math.PI / 8) * Math.pow(lam, -2);
      let sum = 0;
      for (let k = 1; k <= 3; k++) {
        sum += Math.pow(-1, k - 1) * Math.exp(-2 * k * k * lam * lam);
      }
      return 2 * sum;
    }

    /* ========== 分析类型定义 ========== */
    const ANALYSIS_TYPES = [
      { value: 'descriptive', label: '描述性统计' },
      { value: 'oneSample', label: '单样本统计' },
      { value: 'twoSample', label: '双样本统计' },
      { value: 'regression', label: '回归分析' },
      { value: 'multipleRegression', label: '多元线性回归' },
      { value: 'logisticRegression', label: '逻辑回归' },
      { value: 'correlation', label: '相关性分析' },
      { value: 'anova', label: 'ANOVA 方差分析' },
      { value: 'clustering', label: '聚类分析' },
    ];

    /* ========== 列类型检测 ========== */
    function detectColumnTypes(data) {
      if (!data || data.length === 0) return { numericColumns: [], categoricalColumns: [] };
      const cols = Object.keys(data[0]);
      const numeric = [], categorical = [];
      cols.forEach(col => {
        const vals = data.map(r => r[col]).filter(v => v != null && `${v}`.trim() !== '');
        const numCount = vals.filter(v => toNumber(v) != null).length;
        (vals.length > 0 && numCount === vals.length ? numeric : categorical).push(col);
      });
      return { numericColumns: numeric, categoricalColumns: categorical };
    }

    /* ========== 核心分析函数（v2原有） ========== */
    function runAnalysis({ analysisType, data, xColumn, yColumn, compareColumnA, compareColumnB, targetColumn, featureColumns, correlationColumns, groupColumn, hypothesisValue, clusters }) {
      if (!Array.isArray(data) || data.length === 0) return { result: '请先上传 Excel 数据并选择有效工作表。' };
      const valid = data.filter(r => r != null);
      switch (analysisType) {
        case 'descriptive': {
          if (!xColumn) return { result: '请先选择一个数值列用于描述性统计。' };
          const vals = valid.map(r => toNumber(r[xColumn])).filter(v => v != null);
          if (vals.length === 0) return { result: `列 ${xColumn} 未包含有效数值。` };
          return { result: [`列：${xColumn}`, `计数：${vals.length}`, `平均值：${fmt(mean(vals))}`, `中位数：${fmt(median(vals))}`, `众数：${fmt(mode(vals))}`, `标准差：${fmt(stdev(vals))}`, `最小值：${fmt(Math.min(...vals))}`, `最大值：${fmt(Math.max(...vals))}`, `第 25 百分位：${fmt(quantile(vals, 0.25))}`, `第 75 百分位：${fmt(quantile(vals, 0.75))}`].join('\n') };
        }
        case 'oneSample': {
          if (!yColumn) return { result: '请先选择一个数值列用于单样本检验。' };
          const vals = valid.map(r => toNumber(r[yColumn])).filter(v => v != null);
          if (vals.length < 2) return { result: '需要至少两个有效观测值。' };
          const hVal = Number(hypothesisValue);
          if (!Number.isFinite(hVal)) return { result: '请输入有效的假设均值。' };
          const m = mean(vals), sd = stdev(vals), t = sd > 0 ? (m - hVal) / (sd / Math.sqrt(vals.length)) : null;
          return { result: [`列：${yColumn}`, `假设均值：${hVal}`, `样本均值：${fmt(m)}`, `t 统计量：${t == null ? '无法计算' : fmt(t)}`, '说明：|t| 越大表示样本均值与假设值差异越明显。'].join('\n') };
        }
        case 'twoSample': {
          if (!compareColumnA || !compareColumnB) return { result: '请选择两个数值列进行双样本对比。' };
          const a = valid.map(r => toNumber(r[compareColumnA])).filter(v => v != null);
          const b = valid.map(r => toNumber(r[compareColumnB])).filter(v => v != null);
          if (a.length < 2 || b.length < 2) return { result: '每个组别至少需要两个有效观测值。' };
          const ma = mean(a), mb = mean(b);
          const sa = sampleVariance(a), sb = sampleVariance(b);
          const se = Math.sqrt(sa / a.length + sb / b.length);
          const t = se > 0 ? (ma - mb) / se : null;
          return { result: [`组 A：${compareColumnA}（${a.length} 个值）`, `组 B：${compareColumnB}（${b.length} 个值）`, `A 平均值：${fmt(ma)}`, `B 平均值：${fmt(mb)}`, `t 统计量：${t == null ? '无法计算' : fmt(t)}`].join('\n') };
        }
        case 'regression': {
          if (!xColumn || !yColumn) return { result: '请先选择回归分析的 X 和 Y 列。' };
          const pts = valid.map(r => { const x = toNumber(r[xColumn]), y = toNumber(r[yColumn]); return x != null && y != null ? { x, y } : null; }).filter(p => p);
          if (pts.length < 2) return { result: '至少需要两个有效点才能进行线性回归。' };
          const n = pts.length, xs = pts.map(p => p.x), ys = pts.map(p => p.y);
          const mx = mean(xs), my = mean(ys);
          let num = 0, den = 0;
          for (let i = 0; i < n; i++) { num += (xs[i] - mx) * (ys[i] - my); den += (xs[i] - mx) ** 2; }
          const slope = den !== 0 ? num / den : 0, intercept = my - slope * mx;
          return { result: [`X 列：${xColumn}`, `Y 列：${yColumn}`, `模型：y = ${fmt(slope)} x + ${fmt(intercept)}`, `样本数：${n}`].join('\n') };
        }
        case 'correlation': {
          if (!Array.isArray(correlationColumns) || correlationColumns.length < 2) return { result: '请选择至少两个数值列进行相关性分析。' };
          if (correlationColumns.length === 2) {
            const [c1, c2] = correlationColumns;
            const pairs = valid.map(r => { const a = toNumber(r[c1]), b = toNumber(r[c2]); return a != null && b != null ? [a, b] : null; }).filter(Boolean);
            return { result: `Pearson 相关系数：${fmt(pearsonCorr(pairs.map(p => p[0]), pairs.map(p => p[1])))}` };
          }
          const cols = correlationColumns;
          const lines = ['相关性矩阵：', ''];
          lines.push('        ' + cols.map(c => c.padEnd(10)).join(''));
          for (let i = 0; i < cols.length; i++) {
            const row = [cols[i].padEnd(8)];
            for (let j = 0; j < cols.length; j++) {
              if (i === j) { row.push('1.0000'.padEnd(10)); continue; }
              const pairs = valid.map(r => { const a = toNumber(r[cols[i]]), b = toNumber(r[cols[j]]); return a != null && b != null ? [a, b] : null; }).filter(Boolean);
              const r = pairs.length > 1 ? pearsonCorr(pairs.map(p => p[0]), pairs.map(p => p[1])) : NaN;
              row.push(fmt(r).padEnd(10));
            }
            lines.push(row.join(''));
          }
          return { result: lines.join('\n') };
        }
        case 'anova': {
          if (!groupColumn || !targetColumn) return { result: '请选择分组列和目标列。' };
          const groups = {};
          valid.forEach(r => { const g = r[groupColumn]; if (g != null) { if (!groups[g]) groups[g] = []; const v = toNumber(r[targetColumn]); if (v != null) groups[g].push(v); } });
          const gKeys = Object.keys(groups);
          if (gKeys.length < 2) return { result: '分组列至少需要两个组别。' };
          const allVals = gKeys.flatMap(k => groups[k]);
          const grandMean = mean(allVals);
          const totalN = allVals.length, k = gKeys.length;
          let ssb = 0, ssw = 0;
          gKeys.forEach(g => { ssb += groups[g].length * (mean(groups[g]) - grandMean) ** 2; ssw += groups[g].reduce((s, v) => s + (v - mean(groups[g])) ** 2, 0); });
          const msb = ssb / (k - 1), msw = totalN - k > 0 ? ssw / (totalN - k) : 0;
          const f = msw > 0 ? msb / msw : NaN;
          return { result: [`ANOVA 方差分析`, `分组列：${groupColumn}（${k} 组）`, `目标列：${targetColumn}`, `SSB：${fmt(ssb)}`, `SSW：${fmt(ssw)}`, `F 统计量：${fmt(f)}`, `组均值：${gKeys.map(g => `${g}=${fmt(mean(groups[g]))}`).join(', ')}`].join('\n') };
        }
        case 'multipleRegression': {
          if (!Array.isArray(featureColumns) || featureColumns.length === 0 || !targetColumn) return { result: '请选择目标列和特征列。' };
          const rows = valid.map(r => { const y = toNumber(r[targetColumn]); const xs = featureColumns.map(c => toNumber(r[c])); return y != null && xs.every(x => x != null) ? { y, xs } : null; }).filter(Boolean);
          if (rows.length < featureColumns.length + 1) return { result: '样本数不足。' };
          const n = rows.length, p = featureColumns.length;
          const X = rows.map(r => [1, ...r.xs]);
          const Y = rows.map(r => r.y);
          const XtX = Array.from({ length: p + 1 }, (_, i) => Array.from({ length: p + 1 }, (_, j) => X.reduce((s, row) => s + row[i] * row[j], 0)));
          const XtY = Array.from({ length: p + 1 }, (_, i) => X.reduce((s, row, idx) => s + row[i] * Y[idx], 0));
          const aug = XtX.map((row, i) => [...row, XtY[i]]);
          for (let i = 0; i <= p; i++) {
            let maxRow = i;
            for (let k = i + 1; k <= p; k++) if (Math.abs(aug[k][i]) > Math.abs(aug[maxRow][i])) maxRow = k;
            [aug[i], aug[maxRow]] = [aug[maxRow], aug[i]];
            if (Math.abs(aug[i][i]) < 1e-12) return { result: '矩阵不可逆，特征列可能存在完全共线性。' };
            for (let k = i + 1; k <= p; k++) { const f = aug[k][i] / aug[i][i]; for (let j = i; j <= p + 1; j++) aug[k][j] -= f * aug[i][j]; }
          }
          const beta = Array(p + 1);
          for (let i = p; i >= 0; i--) { beta[i] = aug[i][p + 1]; for (let j = i + 1; j <= p; j++) beta[i] -= aug[i][j] * beta[j]; beta[i] /= aug[i][i]; }
          const yMean = mean(Y);
          let ssTot = 0, ssRes = 0;
          rows.forEach((r, i) => { const yPred = X[i].reduce((s, x, j) => s + x * beta[j], 0); ssRes += (r.y - yPred) ** 2; ssTot += (r.y - yMean) ** 2; });
          const r2 = ssTot > 0 ? 1 - ssRes / ssTot : 0;
          return { result: [`多元线性回归`, `目标列：${targetColumn}`, `特征列：${featureColumns.join(', ')}`, `样本数：${n}`, `截距：${fmt(beta[0])}`, ...featureColumns.map((c, i) => `${c} 系数：${fmt(beta[i + 1])}`), `R²：${fmt(r2)}`].join('\n') };
        }
        case 'logisticRegression': {
          if (!Array.isArray(featureColumns) || featureColumns.length === 0 || !targetColumn) return { result: '请选择目标列和特征列。' };
          const rows = valid.map(r => { const y = toNumber(r[targetColumn]); const xs = featureColumns.map(c => toNumber(r[c])); return y != null && xs.every(x => x != null) ? { y: y > 0 ? 1 : 0, xs } : null; }).filter(Boolean);
          if (rows.length < 10) return { result: '逻辑回归需要更多样本（至少10个）。' };
          const p = featureColumns.length;
          const beta = Array(p + 1).fill(0);
          const lr = 0.01;
          for (let iter = 0; iter < 500; iter++) {
            const grad = Array(p + 1).fill(0);
            rows.forEach(r => {
              const z = beta[0] + r.xs.reduce((s, x, i) => s + x * beta[i + 1], 0);
              const pred = 1 / (1 + Math.exp(-Math.max(-500, Math.min(500, z))));
              const err = pred - r.y;
              grad[0] += err;
              r.xs.forEach((x, i) => { grad[i + 1] += err * x; });
            });
            beta.forEach((_, i) => { beta[i] -= lr * grad[i] / rows.length; });
          }
          return { result: [`逻辑回归`, `目标列：${targetColumn}`, `特征列：${featureColumns.join(', ')}`, `样本数：${rows.length}`, `截距：${fmt(beta[0])}`, ...featureColumns.map((c, i) => `${c} 系数：${fmt(beta[i + 1])}`)`].join('\n') };
        }
        case 'clustering': {
          if (!xColumn || !yColumn) return { result: '请先选择两个数值列用于聚类。' };
          const k = clusters || 3;
          const pts = valid.map(r => { const x = toNumber(r[xColumn]), y = toNumber(r[yColumn]); return x != null && y != null ? [x, y] : null; }).filter(Boolean);
          if (pts.length < k) return { result: `可用点不足，至少需要 ${k} 个。` };
          let centers = pts.slice(0, k).map(p => [...p]);
          const labels = Array(pts.length).fill(0);
          for (let iter = 0; iter < 50; iter++) {
            let changed = false;
            pts.forEach((p, i) => {
              let minD = Infinity, bestC = 0;
              centers.forEach((c, ci) => { const d = (p[0] - c[0]) ** 2 + (p[1] - c[1]) ** 2; if (d < minD) { minD = d; bestC = ci; } });
              if (labels[i] !== bestC) { labels[i] = bestC; changed = true; }
            });
            if (!changed) break;
            centers = centers.map((_, ci) => {
              const members = pts.filter((_, i) => labels[i] === ci);
              return members.length === 0 ? centers[ci] : [mean(members.map(m => m[0])), mean(members.map(m => m[1]))];
            });
          }
          return { result: [`聚类数：${k}`, `样本数：${pts.length}`, ...centers.map((c, i) => `簇 ${i + 1} 中心：(${fmt(c[0])}, ${fmt(c[1])})`)].join('\n') };
        }
        default: return { result: '未知分析类型。' };
      }
    }

    /* ========== 新增统计检验函数 ========== */
    // 配对t检验
    function pairedTTest(x, y) {
      if (x.length !== y.length || x.length < 2) return null;
      const diffs = x.map((v, i) => v - y[i]);
      const dMean = mean(diffs);
      const dStd = stdev(diffs);
      if (dStd === 0) return { t: Infinity, df: x.length - 1, p: 0, dMean, dStd };
      const se = dStd / Math.sqrt(diffs.length);
      const t = dMean / se;
      const p = tTwoTailP(t, x.length - 1);
      // Cohen's d
      const pooled = Math.sqrt((stdev(x) ** 2 + stdev(y) ** 2) / 2);
      const cohensD = pooled > 0 ? dMean / pooled : 0;
      return { t, df: x.length - 1, p, dMean, dStd, cohensD };
    }

    // Wilcoxon符号秩检验
    function wilcoxonSignedRankTest(x, y) {
      if (x.length !== y.length || x.length < 5) return null;
      const diffs = x.map((v, i) => v - y[i]).filter(d => Math.abs(d) > 1e-12);
      if (diffs.length < 5) return null;
      const absDiffs = diffs.map(d => Math.abs(d));
      const sorted = [...absDiffs].sort((a, b) => a - b);
      const unique = [...new Set(sorted)];
      // 计算秩（处理 ties，取平均秩）
      const ranks = absDiffs.map(d => {
        const indices = absDiffs.reduce((acc, v, idx) => { if (v === d) acc.push(idx); return acc; }, []);
        return indices.reduce((s, idx) => s + (sorted.indexOf(d) === -1 ? absDiffs.indexOf(d) + 1 : sorted.indexOf(d) + 1) || (indices.reduce((ss, ii) => ss + (sorted.indexOf(absDiffs[ii]) + 1), 0) / indices.length), 0);
      });
      // 简化：直接用序列位置
      const sortedWithIdx = absDiffs.map((d, i) => ({ d, i })).sort((a, b) => a.d - b.d);
      const ranks2 = Array(diffs.length);
      let i2 = 0;
      while (i2 < sortedWithIdx.length) {
        let j = i2;
        while (j < sortedWithIdx.length && sortedWithIdx[j].d === sortedWithIdx[i2].d) j++;
        const avgRank = (i2 + 1 + j) / 2;
        for (let k = i2; k < j; k++) ranks2[sortedWithIdx[k].i] = avgRank;
        i2 = j;
      }
      // T统计量 = 较小秩和
      const posSum = diffs.filter(d => d > 0).reduce((s, _, idx) => s + ranks2[idx], 0);
      const negSum = diffs.filter(d => d < 0).reduce((s, _, idx) => s + ranks2[idx], 0);
      const T = Math.min(posSum, negSum);
      const n = diffs.length;
      // 正态近似（连续性修正）
      const meanT = n * (n + 1) / 4;
      const varT = n * (n + 1) * (2 * n + 1) / 24;
      const z = (T - 0.5 - meanT) / Math.sqrt(varT);
      const p = 2 * (1 - normalCDF(Math.abs(z)));
      // r = z / sqrt(n)
      const r = Math.abs(z) / Math.sqrt(n);
      return { T, meanT, z, p, r, n };
    }

    // Mann-Whitney U检验
    function mannWhitneyUTest(a, b) {
      if (a.length < 1 || b.length < 1) return null;
      const combined = [...a.map(v => ({ v, g: 0 })), ...b.map(v => ({ v, g: 1 }))];
      combined.sort((x, y) => x.v - y.v);
      const ranks = Array(combined.length);
      let i3 = 0;
      while (i3 < combined.length) {
        let j = i3;
        while (j < combined.length && combined[j].v === combined[i3].v) j++;
        const avgRank = (i3 + 1 + j) / 2;
        for (let k = i3; k < j; k++) ranks[combined[k].g === 0 ? k - (combined.slice(0, k).filter(x => x.g === 0).length) : k] = avgRank;
        // 更直接的方式
        for (let k = i3; k < j; k++) {
          const globalIdx = combined.findIndex((x, idx) => idx >= k && combined[idx].v === combined[i3].v);
        }
        i3 = j;
      }
      // 重新实现秩计算
      const allVals = combined.map((item, idx) => ({ v: item.v, g: item.g, origIdx: idx }));
      allVals.sort((x, y) => x.v - y.v);
      const rankMap = Array(combined.length);
      let ti = 0;
      while (ti < allVals.length) {
        let tj = ti;
        while (tj < allVals.length && allVals[tj].v === allVals[ti].v) tj++;
        const avgR = (ti + 1 + tj) / 2;
        for (let tk = ti; tk < tj; tk++) rankMap[allVals[tk].origIdx] = avgR;
        ti = tj;
      }
      // 分组秩和
      const rankA = allVals.filter(x => x.g === 0).reduce((s, item) => s + rankMap[item.origIdx], 0);
      const rankB = allVals.filter(x => x.g === 1).reduce((s, item) => s + rankMap[item.origIdx], 0);
      const U1 = rankA - a.length * (a.length + 1) / 2;
      const U2 = rankB - b.length * (b.length + 1) / 2;
      const U = Math.min(U1, U2);
      const n1 = a.length, n2 = b.length;
      const meanU = n1 * n2 / 2;
      const varU = n1 * n2 * (n1 + n2 + 1) / 24;
      // 连续性修正
      const z = (U + 0.5 - meanU) / Math.sqrt(varU);
      const p = 2 * (1 - normalCDF(Math.abs(z)));
      const r = Math.abs(z) / Math.sqrt(n1 + n2);
      return { U, meanU, z, p, r, n1, n2 };
    }

    // Kruskal-Wallis检验
    function kruskalWallisTest(groups) {
      const keys = Object.keys(groups).filter(k => groups[k].length > 0);
      if (keys.length < 2) return null;
      const allVals = [];
      keys.forEach(k => groups[k].forEach(v => allVals.push({ v, g: k })));
      allVals.sort((x, y) => x.v - y.v);
      const rankMap = Array(allVals.length);
      let ti = 0;
      while (ti < allVals.length) {
        let tj = ti;
        while (tj < allVals.length && allVals[tj].v === allVals[ti].v) tj++;
        const avgR = (ti + 1 + tj) / 2;
        for (let tk = ti; tk < tj; tk++) rankMap[tk] = avgR;
        ti = tj;
      }
      const N = allVals.length;
      const groupRanks = {};
      keys.forEach(k => {
        groupRanks[k] = allVals.filter(x => x.g === k).reduce((s, item, idx) => {
          const origIdx = allVals.findIndex((x, i) => i >= 0 && x.v === item.v && x.g === k && allVals.filter((a, bi) => bi < i && a.v === item.v && a.g === k).length === idx);
          return s + rankMap[origIdx];
        }, 0);
      });
      // 重新：计算每组秩和
      const groupData = keys.map(k => allVals.filter(x => x.g === k));
      const rankByGroup = keys.map(k => {
        let sum = 0;
        allVals.forEach((item, idx) => { if (item.g === k) sum += rankMap[idx]; });
        return sum;
      });
      const H = (12 / (N * (N + 1))) * rankByGroup.reduce((s, rankSum, gi) => s + rankSum * rankSum / groupData[gi].length, 0) - 3 * (N + 1);
      const df = keys.length - 1;
      const p = 1 - chiSquareCDF(H, df);
      // epsilon-squared
      const etaSq = (H - df) / (N - 1);
      return { H, df, p, etaSq, n: N };
    }

    // Friedman检验
    function friedmanTest(dataMatrix) {
      // dataMatrix: 行=样本，列=处理组
      const rows = dataMatrix.length;
      const cols = dataMatrix[0] ? dataMatrix[0].length : 0;
      if (rows < 2 || cols < 2) return null;
      // 计算行内秩
      const rankMatrix = dataMatrix.map(row => {
        const indexed = row.map((v, j) => ({ v, j }));
        indexed.sort((a, b) => a.v - b.v);
        const ranks = Array(row.length);
        let ti = 0;
        while (ti < indexed.length) {
          let tj = ti;
          while (tj < indexed.length && indexed[tj].v === indexed[ti].v) tj++;
          const avgR = (ti + 1 + tj) / 2;
          for (let tk = ti; tk < tj; tk++) ranks[indexed[tk].j] = avgR;
          ti = tj;
        }
        return ranks;
      });
      const colRanks = Array(cols).fill(0);
      rankMatrix.forEach(row => row.forEach((r, j) => { colRanks[j] += r; }));
      const n = rows, k = cols;
      const meanRank = k * (k + 1) / 2;
      const chiSq = (12 * colRanks.reduce((s, cr) => s + (cr - n * meanRank) ** 2, 0)) / (n * k * (k + 1));
      const df = k - 1;
      const p = 1 - chiSquareCDF(chiSq, df);
      // Kendall's W
      const W = chiSq / (n * (k - 1));
      return { chiSq, df, p, W, n, k };
    }

    // 卡方独立性检验
    function chiSquareTest(col1, col2) {
      const freq = {};
      const levels1 = [], levels2 = [];
      col1.forEach(v => { const k = String(v ?? ''); if (!freq[k]) { freq[k] = {}; levels1.push(k); } });
      col2.forEach(v => { const k = String(v ?? ''); levels1.forEach(l1 => { if (freq[l1][k] === undefined) freq[l1][k] = 0; }); levels2.push(k); });
      const uniq2 = [...new Set(levels2)];
      levels1.forEach(l1 => uniq2.forEach(l2 => { if (freq[l1][l2] === undefined) freq[l1][l2] = 0; }));
      col1.forEach((v1, i) => { freq[String(v1 ?? '')][String(col2[i] ?? '')]++; });
      const rowTotals = {};
      const colTotals = {};
      let grand = 0;
      levels1.forEach(r => { rowTotals[r] = 0; uniq2.forEach(c => { rowTotals[r] += freq[r][c]; grand += freq[r][c]; }); });
      uniq2.forEach(c => { colTotals[c] = 0; levels1.forEach(r => { colTotals[c] += freq[r][c]; }); });
      // 计算卡方统计量
      let chiSq = 0;
      levels1.forEach(r => uniq2.forEach(c => {
        const observed = freq[r][c];
        const expected = (rowTotals[r] * colTotals[c]) / grand;
        if (expected > 0) chiSq += (observed - expected) ** 2 / expected;
      }));
      const df = (levels1.length - 1) * (uniq2.length - 1);
      const p = df > 0 ? 1 - chiSquareCDF(chiSq, df) : 1;
      // Cramér's V
      const n = grand;
      const minDim = Math.min(levels1.length, uniq2.length) - 1;
      const cramersV = minDim > 0 ? Math.sqrt(chiSq / (n * minDim)) : 0;
      // 构建列联表
      const contingencyRows = levels1.map(r => [r, ...uniq2.map(c => freq[r][c])]);
      return { chiSq, df, p, cramersV, contingencyRows, colLabels: uniq2, rowLabels: levels1, n };
    }

    // McNemar检验（配对分类数据）
    function mcnemarTest(col1, col2) {
      if (col1.length !== col2.length) return null;
      let b = 0, c = 0;
      col1.forEach((v1, i) => {
        const v2 = col2[i];
        const a1 = String(v1 ?? ''), a2 = String(v2 ?? '');
        if (a1 === '1' || a1 === 'true' || a1 === '是' || a1 === 'yes') {
          if (a2 === '0' || a2 === 'false' || a2 === '否' || a2 === 'no') b++;
        } else {
          if (a2 === '1' || a2 === 'true' || a2 === '是' || a2 === 'yes') c++;
        }
      });
      if (b + c === 0) return { chiSq: 0, p: 1, b, c, n: col1.length };
      const chiSq = (Math.abs(b - c) - 1) ** 2 / (b + c);
      const p = 1 - chiSquareCDF(chiSq, 1);
      return { chiSq, df: 1, p, b, c, n: col1.length };
    }

    /* ========== AI 相关函数 ========== */
    const DEFAULT_AI_CONFIG = { apiKey: '', baseUrl: 'https://api.anthropic.com', model: 'claude-sonnet-4-6', enabled: false };

    function loadAiConfig() {
      try { const s = localStorage.getItem('excel-ai-config'); return s ? { ...DEFAULT_AI_CONFIG, ...JSON.parse(s) } : DEFAULT_AI_CONFIG; } catch { return DEFAULT_AI_CONFIG; }
    }
    function saveAiConfig(cfg) { try { localStorage.setItem('excel-ai-config', JSON.stringify(cfg)); } catch {} }
    function clearAiConfig() { try { localStorage.removeItem('excel-ai-config'); } catch {} }

    async function callAi(config, systemPrompt, userPrompt, onStream) {
      if (!config.apiKey) throw new Error('请先配置 API Key');
      const url = `${config.baseUrl.replace(/\/+$/, '')}/v1/messages`;
      const body = JSON.stringify({ model: config.model, max_tokens: 4096, system: [{ type: 'text', text: systemPrompt }], messages: [{ role: 'user', content: userPrompt }], stream: !!onStream });
      const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': config.apiKey, 'anthropic-version': '2023-06-01' }, body });
      if (!resp.ok) { const t = await resp.text().catch(() => ''); throw new Error(`API 请求失败 (${resp.status}): ${t || resp.statusText}`); }
      if (onStream && resp.body) {
        const reader = resp.body.getReader(), decoder = new TextDecoder();
        let full = '';
        for (;;) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunks = decoder.decode(value, { stream: true }).split('\n').filter(l => l.startsWith('data: '));
          for (const chunk of chunks) {
            try {
              const obj = JSON.parse(chunk.slice(6));
              if (obj.type === 'content_block_delta' && obj.delta?.text) { full += obj.delta.text; onStream(full); }
            } catch {}
          }
        }
        return full;
      }
      const json = await resp.json();
      return json.content?.map(c => c.type === 'text' ? c.text : '').join('').trim() || '';
    }

    function parsePromptToType(text) {
      const t = text.toLowerCase();
      if (t.includes('描述')) return 'descriptive';
      if (t.includes('单样')) return 'oneSample';
      if (t.includes('双样') || t.includes('两样')) return 'twoSample';
      if (t.includes('多元') || (t.includes('多') && t.includes('回归'))) return 'multipleRegression';
      if (t.includes('逻辑')) return 'logisticRegression';
      if (t.includes('相关')) return 'correlation';
      if (t.includes('方差') || t.includes('anova')) return 'anova';
      if (t.includes('回归')) return 'regression';
      if (t.includes('聚类')) return 'clustering';
      return 'descriptive';
    }

    /* ========== 可折叠面板组件 ========== */
    function CollapsiblePanel({ step, title, defaultOpen = true, children }) {
      const [open, setOpen] = useState(defaultOpen);
