                        <td style={{ fontWeight: 600 }}>{row._total != null ? (typeof row._total === 'number' ? row._total.toFixed(2) : row._total) : '-'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ========== 批量分析面板 ========== */
    function BatchAnalysisPanel({ data, columns, numericColumns, categoricalColumns }) {
      const [activeTab, setActiveTab] = useState('desc');
      const [descResult, setDescResult] = useState(null);
      const [corrResult, setCorrResult] = useState(null);
      const [histResults, setHistResults] = useState(null);
      const [groupCol, setGroupCol] = useState('');
      const [groupResult, setGroupResult] = useState(null);
      const descChartRefs = useRef({});
      const chartInstances = useRef([]);

      useEffect(() => {
        if (categoricalColumns.length > 0 && !groupCol) setGroupCol(categoricalColumns[0]);
      }, [categoricalColumns]);

      // 清理图表实例
      useEffect(() => {
        // IIFE: 页面加载时应用暗色模式
      (function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      return () => { chartInstances.current.forEach(c => c.destroy()); chartInstances.current = []; };
      }, []);

      const runDescriptive = () => {
        const rows = numericColumns.map(col => {
          const vals = data.map(r => toNumber(r[col])).filter(v => v != null);
          if (vals.length === 0) return { col, count: 0 };
          return {
            col, count: vals.length, mean: mean(vals), median: median(vals),
            std: stdev(vals), min: Math.min(...vals), max: Math.max(...vals),
            q1: quantile(vals, 0.25), q3: quantile(vals, 0.75)
          };
        });
        setDescResult(rows);
      };

      const runCorrelation = () => {
        if (numericColumns.length < 2) return;
        const matrix = [];
        for (let i = 0; i < numericColumns.length; i++) {
          matrix[i] = [];
          for (let j = 0; j < numericColumns.length; j++) {
            if (i === j) { matrix[i][j] = 1; continue; }
            const pairs = data.map(r => { const a = toNumber(r[numericColumns[i]]), b = toNumber(r[numericColumns[j]]); return a != null && b != null ? [a, b] : null; }).filter(Boolean);
            matrix[i][j] = pairs.length > 1 ? pearsonCorr(pairs.map(p => p[0]), pairs.map(p => p[1])) : 0;
          }
        }
        setCorrResult(matrix);
      };

      const runHistograms = () => {
        // 先清理旧图表
        chartInstances.current.forEach(c => c.destroy());
        chartInstances.current = [];
        setHistResults(numericColumns.slice(0, 10)); // 最多10列
        // 延迟绘制，等DOM更新
        setTimeout(() => {
          numericColumns.slice(0, 10).forEach((col, idx) => {
            const canvas = descChartRefs.current[col];
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const vals = data.map(r => toNumber(r[col])).filter(v => v != null);
            if (vals.length === 0) return;
            const min = Math.min(...vals), max = Math.max(...vals);
            const bins = 15;
            const bw = (max - min) / bins || 1;
            const counts = Array(bins).fill(0);
            const labels = [];
            vals.forEach(v => { const bi = Math.min(Math.floor((v - min) / bw), bins - 1); counts[bi]++; });
            for (let i = 0; i < bins; i++) labels.push((min + i * bw).toFixed(1));
            const chart = new Chart(ctx, {
              type: 'bar',
              data: { labels, datasets: [{ label: col, data: counts, backgroundColor: '#4f46e599', borderColor: '#4f46e5', borderWidth: 1 }] },
              options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: `${col} 分布`, font: { size: 12 } }, legend: { display: false } }, scales: { x: { ticks: { font: { size: 9 } } }, y: { ticks: { font: { size: 9 } } } } }
            });
            chartInstances.current.push(chart);
          });
        }, 100);
      };

      const runGroupStats = () => {
        if (!groupCol) return;
        const groups = {};
        data.forEach(r => {
          const g = r[groupCol];
          if (g == null) return;
          if (!groups[g]) groups[g] = {};
          numericColumns.forEach(col => {
            const v = toNumber(r[col]);
            if (v != null) { if (!groups[g][col]) groups[g][col] = []; groups[g][col].push(v); }
          });
        });
        const result = Object.entries(groups).map(([group, cols]) => {
          const row = { group };
          numericColumns.forEach(col => {
            const vals = cols[col] || [];
            row[`${col}_均值`] = vals.length > 0 ? mean(vals) : null;
            row[`${col}_计数`] = vals.length;
          });
          return row;
        });
        setGroupResult(result);
      };

      const exportCSV = () => {
        let csvContent = '';
        if (activeTab === 'desc' && descResult) {
          csvContent = '列,计数,均值,中位数,标准差,最小值,最大值,Q1,Q3\n';
          descResult.forEach(r => { csvContent += `${r.col},${r.count},${r.mean?.toFixed(4)},${r.median?.toFixed(4)},${r.std?.toFixed(4)},${r.min?.toFixed(4)},${r.max?.toFixed(4)},${r.q1?.toFixed(4)},${r.q3?.toFixed(4)}\n`; });
        } else if (activeTab === 'corr' && corrResult) {
          csvContent = ',' + numericColumns.join(',') + '\n';
          corrResult.forEach((row, i) => { csvContent += numericColumns[i] + ',' + row.map(v => v.toFixed(4)).join(',') + '\n'; });
        } else if (activeTab === 'group' && groupResult) {
          if (groupResult.length > 0) {
            const keys = Object.keys(groupResult[0]);
            csvContent = keys.join(',') + '\n';
            groupResult.forEach(r => { csvContent += keys.map(k => r[k] != null ? (typeof r[k] === 'number' ? r[k].toFixed(4) : r[k]) : '').join(',') + '\n'; });
          }
        } else { return; }
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `batch-analysis-${activeTab}.csv`;
        a.click(); URL.revokeObjectURL(url);
      };

      if (!data || data.length === 0) return null;

      const tabs = [
        { key: 'desc', label: '📊 描述统计' },
        { key: 'corr', label: '🔥 相关矩阵' },
        { key: 'hist', label: '📈 批量直方图' },
        { key: 'group', label: '📋 分组统计' },
      ];

      // IIFE: 页面加载时应用暗色模式
      (function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      return (
        <div>
          <div className="chart-type-tabs" style={{ marginBottom: 16 }}>
            {tabs.map(t => (<button key={t.key} className={`chart-type-tab ${activeTab === t.key ? 'active' : ''}`} onClick={() => setActiveTab(t.key)}>{t.label}</button>))}
          </div>

          {activeTab === 'desc' && (
            <div>
              <button className="btn btn-primary btn-sm" onClick={runDescriptive}>生成描述统计</button>
              {descResult && (
                <div style={{ marginTop: 16 }}>
                  <div className="table-wrapper">
                    <table>
                      <thead><tr><th>列</th><th>计数</th><th>均值</th><th>中位数</th><th>标准差</th><th>最小值</th><th>最大值</th><th>Q1</th><th>Q3</th></tr></thead>
                      <tbody>
                        {descResult.map(r => (
                          <tr key={r.col}><td style={{ fontWeight: 600 }}>{r.col}</td><td>{r.count}</td><td>{r.mean?.toFixed(4)}</td><td>{r.median?.toFixed(4)}</td><td>{r.std?.toFixed(4)}</td><td>{r.min?.toFixed(4)}</td><td>{r.max?.toFixed(4)}</td><td>{r.q1?.toFixed(4)}</td><td>{r.q3?.toFixed(4)}</td></tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          )}

          {activeTab === 'corr' && (
            <div>
              <button className="btn btn-primary btn-sm" onClick={runCorrelation}>生成相关矩阵</button>
              {corrResult && (
                <div style={{ marginTop: 16, overflowX: 'auto' }}>
                  <table style={{ borderCollapse: 'collapse', fontSize: '.82rem' }}>
                    <thead><tr><th style={{ padding: '6px 10px', background: 'var(--gray-100)' }}></th>{numericColumns.map(c => <th key={c} style={{ padding: '6px 10px', background: 'var(--gray-100)', writingMode: 'vertical-rl', maxWidth: 60 }}>{c}</th>)}</tr></thead>
                    <tbody>
                      {corrResult.map((row, i) => (
                        <tr key={i}>
                          <td style={{ padding: '6px 10px', fontWeight: 600, background: 'var(--gray-50)' }}>{numericColumns[i]}</td>
                          {row.map((v, j) => {
                            const intensity = Math.abs(v);
                            const bg = v >= 0 ? `rgba(79,70,229,${intensity * 0.5})` : `rgba(220,38,38,${intensity * 0.5})`;
                            return <td key={j} style={{ padding: '6px 10px', background: bg, color: intensity > 0.5 ? '#fff' : '#333', textAlign: 'center', fontWeight: i === j ? 700 : 400 }}>{v.toFixed(3)}</td>;
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}

          {activeTab === 'hist' && (
            <div>
              <button className="btn btn-primary btn-sm" onClick={runHistograms}>生成批量直方图</button>
              {histResults && (
                <div style={{ marginTop: 16, display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 16 }}>
                  {histResults.map(col => (
                    <div key={col} style={{ background: '#fff', border: '1px solid var(--gray-200)', borderRadius: 8, padding: 12 }}>
                      <canvas ref={el => descChartRefs.current[col] = el} style={{ width: '100%', height: 200 }} />
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {activeTab === 'group' && (
            <div>
              <div className="grid-two" style={{ marginBottom: 12 }}>
                <div className="form-row"><label>分组列</label><select value={groupCol} onChange={e => setGroupCol(e.target.value)}>{categoricalColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
              </div>
              <button className="btn btn-primary btn-sm" onClick={runGroupStats}>生成分组统计</button>
              {groupResult && groupResult.length > 0 && (
                <div style={{ marginTop: 16 }}>
                  <div className="table-wrapper">
                    <table>
                      <thead><tr>{Object.keys(groupResult[0]).map(k => <th key={k}>{k}</th>)}</tr></thead>
                      <tbody>
                        {groupResult.map((r, i) => (
                          <tr key={i}>{Object.entries(r).map(([k, v]) => <td key={k}>{v != null ? (typeof v === 'number' ? v.toFixed(4) : v) : '-'}</td>)}</tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          )}

          {(descResult || corrResult || groupResult) && (
            <div style={{ marginTop: 16 }}>
              <button className="btn btn-outline btn-sm" onClick={exportCSV}>⬇ 导出CSV</button>
            </div>
          )}
        </div>
      );
    }

          if (Array.isArray(parsed.featureColumns)) setFeatureColumns(parsed.featureColumns.filter(c => columns.includes(c)));
          if (Array.isArray(parsed.correlationColumns)) setCorrelationColumns(parsed.correlationColumns.filter(c => columns.includes(c)));
          if (parsed.hypothesisValue) setHypothesisValue(String(parsed.hypothesisValue));
          if (parsed.clusters) setClusters(Number(parsed.clusters));
          if (parsed.explanation) {
            const label = ANALYSIS_TYPES.find(t => t.value === parsed.analysisType)?.label || parsed.analysisType;
            setResult(`[AI 解析结果]\n分析类型: ${label}\n${parsed.explanation}\n\n参数已自动配置，请检查后点击"运行分析"。`);
          }
        } catch (e) { setError(`AI 解析失败: ${e.message || '请检查 API 配置'}`); }
        finally { setAiLoading(false); }
      };

      const aiInterpret = async () => {
        if (!aiConfig.enabled || !aiConfig.apiKey) { setError('请先启用 AI 并配置 API Key'); return; }
        if (!result) { setError('请先运行分析'); return; }
        setAiLoading(true); setError(''); setAiInterpretation('');
        try {
          const userPrompt = [`## 数据信息`, `数据列: ${[...numericColumns.map(c => `${c}(数值)`), ...categoricalColumns.map(c => `${c}(分类)`)].join('、')}`, `数据行数: ${data.length}`, `分析类型: ${ANALYSIS_TYPES.find(t => t.value === analysisType)?.label || analysisType}`, '', '## 分析结果', result].join('\n');
          const sysPrompt = '你是数据分析专家。请用通俗易懂的中文解释统计分析结果，指出关键发现、趋势和业务建议。';
          await callAi(aiConfig, sysPrompt, userPrompt, (text) => setAiInterpretation(text));
        } catch (e) { setError(`AI 解读失败: ${e.message || '请检查 API 配置'}`); }
        finally { setAiLoading(false); }
      };

      const handleDataChange = (newData) => {
        setData(newData);
        if (allSheetData && currentSheet) {
          setAllSheetData(prev => ({ ...prev, [currentSheet]: newData }));
          const types = detectColumnTypes(newData);
          setColumnInfo(prev => ({ ...prev, [currentSheet]: { ...prev[currentSheet], numericColumns: types.numericColumns, categoricalColumns: types.categoricalColumns, previewRows: newData.slice(0, 8) } }));
        }
      };

      const formatSize = (b) => b < 1024 ? b + ' B' : b < 1048576 ? (b / 1024).toFixed(1) + ' KB' : (b / 1048576).toFixed(1) + ' MB';

      // IIFE: 页面加载时应用暗色模式
      (function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      // 统计术语表数据
      const glossaryTerms = [
        { term: '平均值 (Mean)', category: '描述统计', explanation: '所有数值的总和除以样本量。反映数据的集中趋势。公式：μ = Σx / n', formula: 'μ = (x₁ + x₂ + ... + xₙ) / n' },
        { term: '中位数 (Median)', category: '描述统计', explanation: '将数据从小到大排序后，位于中间位置的值。不受极端值影响。', formula: '如果 n 为奇数：中位数 = x₍ₙ₊₁₎/₂；如果 n 为偶数：中位数 = (xₙ/₂ + xₙ/₂₊₁) / 2' },
        { term: '众数 (Mode)', category: '描述统计', explanation: '数据中出现次数最多的值。可能不存在或有多个众数。', formula: '无公式，直接统计频率' },
        { term: '标准差 (Standard Deviation)', category: '描述统计', explanation: '衡量数据偏离平均值的平均距离。标准差越大，数据越分散。', formula: 'σ = √[Σ(x - μ)² / n]' },
        { term: '方差 (Variance)', category: '描述统计', explanation: '标准差的平方。衡量数据的离散程度。', formula: 'σ² = Σ(x - μ)² / n' },
        { term: '四分位距 (IQR)', category: '描述统计', explanation: '第三四分位数(Q3)与第一四分位数(Q1)的差值。反映中间50%数据的离散程度。', formula: 'IQR = Q3 - Q1' },
        { term: '相关系数 (Correlation)', category: '相关性', explanation: '衡量两个变量之间的线性相关程度。取值范围[-1, 1]。1表示完全正相关，-1表示完全负相关，0表示无线性相关。', formula: 'r = Σ[(x - x̄)(y - ȳ)] / √[Σ(x - x̄)² · Σ(y - ȳ)²]' },
        { term: 'P值 (P-value)', category: '假设检验', explanation: '在原假设成立的前提下，观察到当前样本或更极端情况的概率。P值越小，拒绝原假设的证据越强。通常以0.05为阈值。', formula: 'P = P(观察到当前样本 | H₀成立)' },
        { term: '置信区间 (Confidence Interval)', category: '推断统计', explanation: '一个区间估计，以一定的置信水平（如95%）包含总体参数的真值。', formula: 'CI = x̄ ± z* · (σ/√n)' },
        { term: '假设检验 (Hypothesis Testing)', category: '假设检验', explanation: '通过样本数据来判断关于总体的假设是否成立。包括原假设(H₀)和备择假设(H₁)。', formula: '无单一公式，流程：设定假设 → 计算检验统计量 → 比较P值或临界值' },
        { term: 't检验 (t-test)', category: '假设检验', explanation: '用于小样本(n<30)的均值检验。单样本t检验、独立样本t检验、配对t检验。', formula: 't = (x̄ - μ) / (s/√n)' },
        { term: '卡方检验 (Chi-square Test)', category: '假设检验', explanation: '用于检验分类变量之间的独立性或拟合优度。', formula: 'χ² = Σ[(观测值 - 期望值)² / 期望值]' },
        { term: '线性回归 (Linear Regression)', category: '回归分析', explanation: '建立自变量(X)和因变量(Y)之间的线性关系模型。用于预测和解释。', formula: 'Y = β₀ + β₁X + ε' },
        { term: '正态分布 (Normal Distribution)', category: '概率分布', explanation: '对称的钟形曲线。均值=中位数=众数。68%数据在±1标准差内，95%在±2标准差内。', formula: 'f(x) = (1/σ√2π) · e^(-(x-μ)²/(2σ²))' },
        { term: '二项分布 (Binomial Distribution)', category: '概率分布', explanation: 'n次独立伯努利试验中成功次数的离散概率分布。', formula: 'P(X=k) = C(n,k) · pᵏ · (1-p)ⁿ⁻ᵏ' },
        { term: '中心极限定理 (CLT)', category: '推断统计', explanation: '无论总体分布如何，当样本量足够大时(n≥30)，样本均值的抽样分布近似正态分布。', formula: 'x̄ ~ N(μ, σ²/n) （当n足够大时）' }
      ];

      const [glossarySearch, setGlossarySearch] = useState('');
      const filteredTerms = glossaryTerms.filter(t =>
        t.term.toLowerCase().includes(glossarySearch.toLowerCase()) ||
        t.explanation.toLowerCase().includes(glossarySearch.toLowerCase()) ||
        t.category.includes(glossarySearch)
      );

      return (
        <div className="app-shell">
          <header className="app-header">
            <h1>Excel 自动统计分析工具</h1>
            <p>上传 Excel 文件，在浏览器中完成统计分析 · 支持数据清洗与可视化</p>
          </header>

          <div className="ai-config-bar">
            <button className={`btn ${aiConfig.enabled ? 'btn-ai-active' : 'btn-outline'} btn-sm`} onClick={() => setShowAiConfig(!showAiConfig)}>
              {aiConfig.enabled ? '🤖 AI 已就绪' : '⚙ AI 设置'}
            </button>
            {aiConfig.enabled && aiConfig.apiKey && <span className="ai-status-ok">API 已连接</span>}
          </div>

          {showAiConfig && (
            <section className="panel ai-config-panel">
              <h2 style={{ margin: '0 0 16px', fontSize: '1rem' }}>🤖 AI 配置</h2>
              <div className="form-row"><label><input type="checkbox" checked={aiConfig.enabled} onChange={e => updateAiConfig({ enabled: e.target.checked })} style={{ width: 'auto', marginRight: 8 }} />启用 AI 功能</label></div>
              <div className="form-row"><label>API Key / Token <span className="label-hint">(必填)</span></label><input type="password" value={aiConfig.apiKey} onChange={e => updateAiConfig({ apiKey: e.target.value })} placeholder="输入你的 API Key 或 Coding Plan Token" /></div>
              <div className="grid-two">
                <div className="form-row"><label>API Base URL <span className="label-hint">(必填)</span></label><input type="text" value={aiConfig.baseUrl} onChange={e => updateAiConfig({ baseUrl: e.target.value })} placeholder="https://api.anthropic.com" /></div>
                <div className="form-row"><label>模型</label>
                  <select value={customModel ? '__custom__' : aiConfig.model} onChange={e => { const v = e.target.value; if (v === '__custom__') setCustomModel(true); else { setCustomModel(false); updateAiConfig({ model: v }); } }}>
                    {MODEL_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                  </select>
                  {customModel && <input type="text" value={aiConfig.model} onChange={e => updateAiConfig({ model: e.target.value })} placeholder="输入模型名称" style={{ marginTop: 8 }} />}
                </div>
              </div>
              <div className="ai-config-actions">
                <button className="btn btn-primary btn-sm" onClick={saveConfig} disabled={!aiConfig.apiKey}>{configSaved ? '✅ 已保存' : '💾 保存配置'}</button>
                {configSaved && <button className="btn btn-outline btn-sm" onClick={clearConfig}>🗑 清除已保存配置</button>}
              </div>
              <div className="ai-config-hint">支持任意兼容 Anthropic Messages API 格式的服务。</div>
            </section>
          )}

          {/* Step 1: 上传文件 */}
          <CollapsiblePanel step={1} title="上传 Excel 文件">
            {fileName ? (
              <>
                <div className="file-info">
                  <span className="file-icon">📊</span>
                  <span className="file-name">{fileName}</span>
                  <span className="file-size">{formatSize(fileSize)}</span>
                  <button className="file-remove" onClick={resetAll} title="移除文件">✕</button>
                </div>
                {sheets.length > 1 && (<div className="sheet-tabs">{sheets.map(s => <button key={s} className={`sheet-tab ${s === currentSheet ? 'active' : ''}`} onClick={() => switchSheet(s)}>{s}</button>)}</div>)}
              </>
            ) : (
              <div className={`upload-zone ${dragOver ? 'drag-over' : ''}`} onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave} onClick={() => document.getElementById('file-input')?.click()}>
                <div className="upload-icon">📂</div>
                <div className="upload-text">点击选择文件，或将 Excel 文件拖拽到此处</div>
                <div className="upload-hint">支持 .xlsx 和 .xls 格式</div>
                <input id="file-input" type="file" accept=".xlsx,.xls" onChange={onFileInput} />
              </div>
            )}
            {error && <div className="alert alert-error"><span>⚠️</span><span>{error}</span><button className="alert-close" onClick={() => setError('')}>✕</button></div>}
          </CollapsiblePanel>

          {/* Step 2: 数据预览 */}
          {previewRows.length > 0 && (
            <CollapsiblePanel step={2} title="数据预览">
              <div className="data-stats">
                <span className="stat-chip"><strong>{data.length}</strong> 行数据</span>
                <span className="stat-chip"><strong>{columns.length}</strong> 列</span>
                <span className="stat-chip">数值列: <strong>{numericColumns.length}</strong></span>
                <span className="stat-chip">分类列: <strong>{categoricalColumns.length}</strong></span>
              </div>
              <div className="table-wrapper">
                <table>
                  <thead><tr>{Object.keys(previewRows[0]).map(c => <th key={c}>{c}</th>)}</tr></thead>
                  <tbody>{previewRows.map((row, i) => <tr key={i}>{Object.keys(previewRows[0]).map(c => <td key={c}>{String(row[c] ?? '')}</td>)}</tr>)}</tbody>
                </table>
              </div>
            </CollapsiblePanel>
          )}

          {/* Step 2.5: 数据清洗 */}
          {hasData && (
            <CollapsiblePanel step="2.5" title="🧹 数据清洗" defaultOpen={false}>
              <DataCleaningPanel data={data} columns={columns} numericColumns={numericColumns} categoricalColumns={categoricalColumns} onDataChange={handleDataChange} columnInfo={columnInfo} currentSheet={currentSheet} setColumnInfo={setColumnInfo} />
            </CollapsiblePanel>
          )}

          {/* ★★★ 新增模块2：数据转换 ★★★ */}
          {hasData && (
            <CollapsiblePanel step="2.6" title="🔧 数据转换" defaultOpen={false}>
              <DataTransformationPanel data={data} columns={columns} numericColumns={numericColumns} categoricalColumns={categoricalColumns} onDataChange={handleDataChange} />
            </CollapsiblePanel>
          )}

          {/* Step 3: 选择分析类型 */}
          {hasData && (
            <CollapsiblePanel step={3} title="选择分析类型">
              <div className="form-row">
                <div className="label-with-action"><label>分析提示词</label>{aiConfig.enabled && aiConfig.apiKey && <button className="btn btn-ai btn-sm" onClick={aiParsePrompt} disabled={aiLoading || !analysisPrompt.trim()}>🤖 AI 解析提示词</button>}</div>
                <textarea rows={2} value={analysisPrompt} onChange={e => onPromptChange(e.target.value)} placeholder="例如：描述性统计、相关性分析、逻辑回归、ANOVA&#10;或输入自然语言：看看销售额和广告投入有没有关系" />
              </div>
              <div className="form-row"><label>分析类型</label><select value={analysisType} onChange={e => setAnalysisType(e.target.value)}>{ANALYSIS_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}</select></div>
            </CollapsiblePanel>
          )}

          {/* Step 4: 选择字段与参数 */}
          {hasData && (
            <CollapsiblePanel step={4} title="选择字段与参数">
              <div className="grid-two">
                <div className="form-row"><label>数值列 <span className="label-hint">(可用)</span></label><div className="badge-list">{numericColumns.length > 0 ? numericColumns.map(c => <span key={c} className="badge-numeric">{c}</span>) : <span style={{ color: 'var(--gray-400)', fontSize: '.85rem' }}>无</span>}</div></div>
                <div className="form-row"><label>分类列 <span className="label-hint">(可用)</span></label><div className="badge-list">{categoricalColumns.length > 0 ? categoricalColumns.map(c => <span key={c} className="badge-categorical">{c}</span>) : <span style={{ color: 'var(--gray-400)', fontSize: '.85rem' }}>无</span>}</div></div>
              </div>
              <div className="grid-two">
                <div className="form-row"><label>X 列</label><select value={xColumn} onChange={e => setXColumn(e.target.value)}><option value="">请选择</option>{columnOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
                <div className="form-row"><label>Y 列</label><select value={yColumn} onChange={e => setYColumn(e.target.value)}><option value="">请选择</option>{columnOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
              </div>
              {analysisType === 'twoSample' && (
                <div className="grid-two">
                  <div className="form-row"><label>比较列 A</label><select value={compareColumnA} onChange={e => setCompareColumnA(e.target.value)}><option value="">请选择</option>{columnOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
                  <div className="form-row"><label>比较列 B</label><select value={compareColumnB} onChange={e => setCompareColumnB(e.target.value)}><option value="">请选择</option>{columnOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
                </div>
              )}
              {analysisType === 'correlation' && (<div className="form-row"><label>相关列（多选）</label><select multiple size={Math.min(6, columnOptions.length)} value={correlationColumns} onChange={e => setCorrelationColumns(Array.from(e.target.selectedOptions, o => o.value))}>{columnOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></div>)}
              {analysisType === 'anova' && (
                <div className="grid-two">
                  <div className="form-row"><label>分组列</label><select value={groupColumn} onChange={e => setGroupColumn(e.target.value)}><option value="">请选择</option>{columnOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
                  <div className="form-row"><label>目标列</label><select value={targetColumn} onChange={e => setTargetColumn(e.target.value)}><option value="">请选择</option>{columnOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
                </div>
              )}
              {(analysisType === 'multipleRegression' || analysisType === 'logisticRegression') && (
                <>
                  <div className="form-row"><label>特征列（多选）</label><select multiple size={Math.min(6, columnOptions.length)} value={featureColumns} onChange={e => setFeatureColumns(Array.from(e.target.selectedOptions, o => o.value))}>{columnOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
                  <div className="form-row"><label>目标列</label><select value={targetColumn} onChange={e => setTargetColumn(e.target.value)}><option value="">请选择</option>{columnOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}</select></div>
                </>
              )}
              {analysisType === 'oneSample' && <div className="form-row"><label>单样本假设值</label><input type="text" value={hypothesisValue} onChange={e => setHypothesisValue(e.target.value)} placeholder="例如 0 或 10" /></div>}
              {analysisType === 'clustering' && <div className="form-row"><label>聚类簇数</label><input type="number" min={2} value={clusters} onChange={e => setClusters(Number(e.target.value))} /></div>}
            </CollapsiblePanel>
          )}

          {/* ★★★ 新增模块1：更多统计检验 ★★★ */}
          {hasData && (
            <CollapsiblePanel step="4.5" title="📊 更多统计检验" defaultOpen={false}>
              <StatisticalTestsPanel data={data} numericColumns={numericColumns} categoricalColumns={categoricalColumns} columns={columns} />
            </CollapsiblePanel>
          )}

          {/* 操作按钮 */}
          {hasData && (
            <section className="panel">
              <div className="actions">
                <button className="btn btn-primary" onClick={runAnalysisClick} disabled={loading || aiLoading}>{loading ? '分析中...' : '▶ 运行分析'}</button>
                <button className="btn btn-success" onClick={exportExcel} disabled={!result || loading}>⬇ 导出 Excel 结果</button>
                <button className="btn btn-pdf" onClick={exportPDF} disabled={!result || loading} style={{background: "#dc2626"}}>📄 导出 PDF</button>
                <button className="btn btn-word" onClick={exportWord} disabled={!result || loading} style={{background: "#2563eb"}}>📝 导出 Word</button>
                <button className="btn btn-outline" onClick={resetAll}>重新上传</button>
              </div>
            </section>
          )}

          {/* ★★★ 新增功能1：历史记录 ★★★ */}
          {history.length > 0 && (
            <CollapsiblePanel step="9" title="📋 历史记录" defaultOpen={false}>
              <div style={{marginBottom: 12}}>
                <button className="btn btn-sm btn-outline" onClick={() => { setHistory([]); localStorage.removeItem("analysisHistory"); }}>清空历史</button>
              </div>
              <div style={{maxHeight: 300, overflowY: "auto"}}>
                {history.map(item => (
                  <div key={item.id} style={{padding: "8px", borderBottom: "1px solid var(--gray-200)", fontSize: ".85rem"}}>
                    <div style={{display: "flex", justifyContent: "space-between"}}>
                      <strong>{item.type}</strong>
                      <span style={{color: "var(--gray-400)"}}>{item.time}</span>
                    </div>
                    <div style={{color: "var(--gray-500)", marginTop: 4}}>{item.fileName}</div>
                    <div style={{marginTop: 4, maxHeight: 60, overflow: "hidden", fontSize: ".8rem"}}>{item.result}</div>
                  </div>
                ))}
              </div>
            </CollapsiblePanel>
          )}

          {/* 分析结果 */}
          <section className="panel">
            <div className="panel-header" style={{ cursor: 'default' }}>
              <h2><span className="step-badge">{hasData ? 5 : 2}</span>分析结果</h2>
            </div>
            <div className="panel-body" style={{ marginTop: 16 }}>
              {result ? (
                <>
                  <div className="result-toolbar">
                    <button className="btn btn-outline btn-sm" onClick={() => copyText(result)}>📋 复制</button>
                    {aiConfig.enabled && aiConfig.apiKey && <button className="btn btn-ai btn-sm" onClick={aiInterpret} disabled={aiLoading}>{aiLoading ? '🤖 解读中...' : '🤖 AI 解读结果'}</button>}
                  </div>
                  <div className="result-container"><pre>{result}</pre></div>
                </>
              ) : (
                <div className="result-placeholder">
                  <div className="placeholder-icon">📋</div>
                  <div className="placeholder-text">{hasData ? '请配置分析参数后点击"运行分析"' : '请上传 Excel 文件'}</div>
                </div>
              )}
              {aiInterpretation && (
                <div className="ai-interpretation">
                  <div className="ai-interp-header"><span>🤖 AI 解读</span><button className="btn btn-outline btn-sm" onClick={() => copyText(aiInterpretation)}>📋 复制</button></div>
                  <pre ref={aiInterpRef} className="ai-interp-content">{aiInterpretation}</pre>
                </div>
              )}
            </div>
          </section>

          {/* Step 6: 图表分析 */}
          {hasData && (
            <CollapsiblePanel step={6} title="📈 图表分析" defaultOpen={false}>
              <DataVisualizationPanel data={data} numericColumns={numericColumns} categoricalColumns={categoricalColumns} columns={columns} />
            </CollapsiblePanel>
          )}

          {/* Step 7: 透视表分析 */}
          {hasData && (
            <CollapsiblePanel step={7} title="📊 透视表分析" defaultOpen={false}>
              <PivotTablePanel data={data} columns={columns} numericColumns={numericColumns} categoricalColumns={categoricalColumns} />
            </CollapsiblePanel>
          )}

          {/* Step 8: 批量分析 */}
          {hasData && (
            <CollapsiblePanel step={8} title="🔬 批量分析" defaultOpen={false}>
              <BatchAnalysisPanel data={data} columns={columns} numericColumns={numericColumns} categoricalColumns={categoricalColumns} />
            </CollapsiblePanel>
          )}

          <section className="panel note">
            <h2 style={{ margin: 0 }}>🔒 数据安全说明</h2>
            <p>统计分析在浏览器中本地完成。AI 功能将列名和分析结果发送到您配置的 API 地址，原始数据不会离开您的电脑。</p>
          </section>

          {loading && (
            <div className="loading-overlay">
              <div className="loading-card">
                <div className="spinner"></div>
                <div className="loading-text">{aiLoading ? 'AI 处理中...' : '正在处理，请稍候...'}</div>
              </div>
            </div>
          )}
          {/* 统计术语表面板 */}
          {glossaryOpen && (
            <div className="glossary-panel" onClick={() => setGlossaryOpen(false)}>
              <div className="glossary-content" onClick={e => e.stopPropagation()}>
                <div className="glossary-header">
                  <h2>📖 统计术语表</h2>
                  <button onClick={() => setGlossaryOpen(false)} style={{background: 'none', border: 'none', fontSize: '24px', cursor: 'pointer'}}>✕</button>
                </div>
                <input
                  className="glossary-search"
                  type="text"
                  placeholder="搜索术语..."
                  value={glossarySearch}
                  onChange={e => setGlossarySearch(e.target.value)}
                />
                {Object.keys(
                  filteredTerms.reduce((acc, t) => {
                    if (!acc[t.category]) acc[t.category] = [];
                    acc[t.category].push(t);
                    return acc;
                  }, {})
                ).map(category => (
                  <div key={category} className="glossary-category">
                    <h3>{category}</h3>
                    {filteredTerms.filter(t => t.category === category).map((t, idx) => (
                      <div key={idx} className="glossary-term">
                        <h4>{t.term}</h4>
                        <p>{t.explanation}</p>
                        {t.formula && <code>{t.formula}</code>}
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<React.StrictMode><App /></React.StrictMode>);
  </script>
</body>
</html>
