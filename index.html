    /* ========== 数据清洗组件 ========== */
    function DataCleaningPanel({ data, columns, numericColumns, categoricalColumns, onDataChange, columnInfo, currentSheet, setColumnInfo }) {
      const [cleanLog, setCleanLog] = useState([]);
      const addLog = (msg) => setCleanLog(prev => [...prev, `[${new Date().toLocaleTimeString()}] ${msg}`]);

      const missingStats = useMemo(() => {
        if (!data || data.length === 0) return [];
        return columns.map(col => {
          const missing = data.filter(r => r[col] == null || `${r[col]}`.trim() === '').length;
          return { col, missing, total: data.length, pct: data.length > 0 ? (missing / data.length * 100) : 0 };
        }).filter(s => s.missing > 0);
      }, [data, columns]);

      const fillMissing = (col, method, customVal) => {
        const newData = data.map(row => {
          const val = row[col];
          const isEmpty = val == null || `${val}`.trim() === '';
          if (!isEmpty) return { ...row };
          let fillVal;
          if (method === 'mean') { const nums = data.map(r => toNumber(r[col])).filter(v => v != null); fillVal = nums.length > 0 ? mean(nums) : customVal; }
          else if (method === 'median') { const nums = data.map(r => toNumber(r[col])).filter(v => v != null); fillVal = nums.length > 0 ? median(nums) : customVal; }
          else if (method === 'mode') { const vals = data.map(r => r[col]).filter(v => v != null && `${v}`.trim() !== ''); fillVal = vals.length > 0 ? mode(vals) : customVal; }
          else { fillVal = customVal; }
          return { ...row, [col]: fillVal };
        });
        onDataChange(newData);
        addLog(`列 "${col}" 缺失值已填充（${method === 'custom' ? `自定义: ${customVal}` : method}）`);
      };

      const dropMissingRows = (col) => {
        const newData = data.filter(r => r[col] != null && `${r[col]}`.trim() !== '');
        onDataChange(newData);
        addLog(`删除列 "${col}" 缺失行，剩余 ${newData.length} 行`);
      };

      const outlierInfo = useMemo(() => {
        return numericColumns.map(col => {
          const vals = data.map(r => toNumber(r[col])).filter(v => v != null);
          if (vals.length < 4) return { col, outliers: [], q1: 0, q3: 0 };
          const q1 = quantile(vals, 0.25), q3 = quantile(vals, 0.75);
          const iqr = q3 - q1;
          const lower = q1 - 1.5 * iqr, upper = q3 + 1.5 * iqr;
          const outliers = vals.filter(v => v < lower || v > upper);
          return { col, outliers, q1, q3, lower, upper, count: outliers.length };
        }).filter(o => o.count > 0);
      }, [data, numericColumns]);

      const removeOutliers = (col) => {
        const info = outlierInfo.find(o => o.col === col);
        if (!info) return;
        const newData = data.filter(r => { const v = toNumber(r[col]); return v == null || (v >= info.lower && v <= info.upper); });
        onDataChange(newData);
        addLog(`列 "${col}" 已删除 ${info.count} 个异常值，剩余 ${newData.length} 行`);
      };

      const replaceOutliers = (col) => {
        const info = outlierInfo.find(o => o.col === col);
        if (!info) return;
        const newData = data.map(r => {
          const v = toNumber(r[col]);
          if (v == null) return { ...row };
          if (v < info.lower) return { ...r, [col]: info.lower };
          if (v > info.upper) return { ...r, [col]: info.upper };
          return { ...r };
        });
        onDataChange(newData);
        addLog(`列 "${col}" 异常值已替换为边界值`);
      };

      const duplicateCount = useMemo(() => {
        if (!data || data.length === 0) return 0;
        const seen = new Set();
        let dupes = 0;
        data.forEach(r => { const key = JSON.stringify(r); if (seen.has(key)) dupes++; else seen.add(key); });
        return dupes;
      }, [data]);

      const removeDuplicates = () => {
        const seen = new Set();
        const newData = data.filter(r => { const key = JSON.stringify(r); if (seen.has(key)) return false; seen.add(key); return true; });
        onDataChange(newData);
        addLog(`去重完成：删除 ${data.length - newData.length} 行重复，剩余 ${newData.length} 行`);
      };

      const convertType = (col, fromType, toType) => {
        const newData = data.map(r => {
          if (toType === 'numeric' && fromType === 'categorical') { const n = toNumber(r[col]); return n != null ? { ...r, [col]: n } : { ...r, [col]: r[col] }; }
          if (toType === 'categorical' && fromType === 'numeric') { return { ...r, [col]: r[col] != null ? String(r[col]) : r[col] }; }
          return { ...r };
        });
        if (setColumnInfo && columnInfo && currentSheet) {
          const newInfo = { ...columnInfo };
          if (toType === 'numeric') {
            newInfo[currentSheet] = { ...newInfo[currentSheet], numericColumns: [...(newInfo[currentSheet]?.numericColumns || []).filter(c => c !== col), col], categoricalColumns: (newInfo[currentSheet]?.categoricalColumns || []).filter(c => c !== col) };
          } else {
            newInfo[currentSheet] = { ...newInfo[currentSheet], categoricalColumns: [...(newInfo[currentSheet]?.categoricalColumns || []).filter(c => c !== col), col], numericColumns: (newInfo[currentSheet]?.numericColumns || []).filter(c => c !== col) };
          }
          setColumnInfo(newInfo);
        }
        onDataChange(newData);
        addLog(`列 "${col}" 已从${fromType === 'numeric' ? '数值' : '分类'}转为${toType === 'numeric' ? '数值' : '分类'}`);
      };

      const [filterCol, setFilterCol] = useState('');
      const [filterOp, setFilterOp] = useState('eq');
      const [filterVal, setFilterVal] = useState('');
      const [sortCol, setSortCol] = useState('');
      const [sortDir, setSortDir] = useState('asc');

      const applyFilter = () => {
        if (!filterCol || !filterVal) return;
        let newData;
        const isNum = numericColumns.includes(filterCol);
        if (isNum) {
          const target = Number(filterVal);
          newData = data.filter(r => { const v = toNumber(r[filterCol]); if (v == null) return false; switch (filterOp) { case 'eq': return v === target; case 'ne': return v !== target; case 'gt': return v > target; case 'lt': return v < target; case 'gte': return v >= target; case 'lte': return v <= target; default: return true; } });
        } else {
          newData = data.filter(r => { const v = String(r[filterCol] ?? ''); switch (filterOp) { case 'eq': return v === filterVal; case 'ne': return v !== filterVal; case 'contains': return v.includes(filterVal); default: return true; } });
        }
        onDataChange(newData);
        addLog(`筛选：${filterCol} ${filterOp} ${filterVal}，剩余 ${newData.length} 行`);
      };

      const applySort = () => {
        if (!sortCol) return;
        const isNum = numericColumns.includes(sortCol);
        const sorted = [...data].sort((a, b) => { const va = a[sortCol], vb = b[sortCol]; let cmp; if (isNum) { cmp = (toNumber(va) ?? -Infinity) - (toNumber(vb) ?? -Infinity); } else { cmp = String(va ?? '').localeCompare(String(vb ?? '')); } return sortDir === 'asc' ? cmp : -cmp; });
        onDataChange(sorted);
        addLog(`排序：${sortCol} ${sortDir === 'asc' ? '升序' : '降序'}`);
      };

      if (!data || data.length === 0) return null;
      // IIFE: 页面加载时应用暗色模式
      (function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      return (
        <div>
          <div className="clean-section">
            <h3>📋 缺失值处理</h3>
            {missingStats.length === 0 ? (
              <div style={{ color: 'var(--success)', fontSize: '.9rem' }}>✅ 无缺失值</div>
            ) : (
              <div>
                <div className="clean-missing-grid" style={{ marginBottom: 8, fontWeight: 600, color: 'var(--gray-500)', fontSize: '.8rem' }}>
                  <span>列名</span><span>缺失占比</span><span>缺失数</span><span>操作</span>
                </div>
                {missingStats.map(s => (
                  <div key={s.col} className="clean-missing-grid">
                    <span className="col-name">{s.col}</span>
                    <div className="missing-bar"><div className="missing-bar-fill" style={{ width: `${s.pct}%` }}></div></div>
                    <span className="missing-count">{s.missing}/{s.total}</span>
                    <div className="missing-action" style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                      <button className="btn btn-outline btn-sm" onClick={() => dropMissingRows(s.col)} title="删除含缺失行">🗑 删除行</button>
                      <button className="btn btn-outline btn-sm" onClick={() => fillMissing(s.col, 'mean')} title="均值填充">均值</button>
                      <button className="btn btn-outline btn-sm" onClick={() => fillMissing(s.col, 'median')} title="中位数填充">中位</button>
                      <button className="btn btn-outline btn-sm" onClick={() => fillMissing(s.col, 'custom', 0)} title="自定义填充0">填0</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="clean-section">
            <h3>⚠️ 异常值检测 (IQR)</h3>
            {outlierInfo.length === 0 ? (
              <div style={{ color: 'var(--success)', fontSize: '.9rem' }}>✅ 未检测到异常值</div>
            ) : (
              <table className="outlier-table">
                <thead><tr><th>列</th><th>异常数</th><th>范围</th><th>操作</th></tr></thead>
                <tbody>
                  {outlierInfo.map(o => (
                    <tr key={o.col}>
                      <td>{o.col}</td>
                      <td className="outlier-val">{o.count}</td>
                      <td style={{ fontSize: '.8rem' }}>[{fmt(o.lower)}, {fmt(o.upper)}]</td>
                      <td>
                        <button className="btn btn-outline btn-sm" onClick={() => removeOutliers(o.col)}>删除</button>
                        <button className="btn btn-outline btn-sm" onClick={() => replaceOutliers(o.col)} style={{ marginLeft: 4 }}>替换为边界</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>

          <div className="clean-section">
            <h3>🔄 去重</h3>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <span style={{ fontSize: '.9rem', color: duplicateCount > 0 ? 'var(--warning)' : 'var(--success)' }}>
                {duplicateCount > 0 ? `⚠ 检测到 ${duplicateCount} 行重复` : '✅ 无重复行'}
              </span>
              {duplicateCount > 0 && <button className="btn btn-outline btn-sm" onClick={removeDuplicates}>一键去重</button>}
            </div>
          </div>

          <div className="clean-section">
            <h3>🔄 类型转换</h3>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {numericColumns.map(col => (
                <button key={col} className="btn btn-outline btn-sm" onClick={() => convertType(col, 'numeric', 'categorical')}>{col} (# → ■)</button>
              ))}
              {categoricalColumns.map(col => (
                <button key={col} className="btn btn-outline btn-sm" onClick={() => convertType(col, 'categorical', 'numeric')}>{col} (■ → #)</button>
              ))}
            </div>
          </div>

          <div className="clean-section">
            <h3>🔍 筛选与排序</h3>
            <div className="filter-row">
              <select value={filterCol} onChange={e => setFilterCol(e.target.value)}><option value="">选择列</option>{columns.map(c => <option key={c} value={c}>{c}</option>)}</select>
              <select value={filterOp} onChange={e => setFilterOp(e.target.value)}>
                {numericColumns.includes(filterCol) ? (<><option value="eq">=</option><option value="ne">≠</option><option value="gt">&gt;</option><option value="lt">&lt;</option><option value="gte">≥</option><option value="lte">≤</option></>) : (<><option value="eq">等于</option><option value="ne">不等于</option><option value="contains">包含</option></>)}
              </select>
              <input type="text" value={filterVal} onChange={e => setFilterVal(e.target.value)} placeholder="值" style={{ width: 120 }} />
              <button className="btn btn-primary btn-sm" onClick={applyFilter}>筛选</button>
            </div>
            <div className="filter-row">
              <select value={sortCol} onChange={e => setSortCol(e.target.value)}><option value="">选择排序列</option>{columns.map(c => <option key={c} value={c}>{c}</option>)}</select>
              <select value={sortDir} onChange={e => setSortDir(e.target.value)}><option value="asc">升序</option><option value="desc">降序</option></select>
              <button className="btn btn-primary btn-sm" onClick={applySort}>排序</button>
            </div>
          </div>

          {cleanLog.length > 0 && (
            <div style={{ marginTop: 12, padding: 12, background: '#1e1e2e', borderRadius: 'var(--radius-sm)', maxHeight: 150, overflowY: 'auto' }}>
              <div style={{ fontSize: '.8rem', color: '#a5f3fc', fontFamily: 'monospace', whiteSpace: 'pre-wrap' }}>{cleanLog.join('\n')}</div>
              <button className="btn btn-outline btn-sm" style={{ marginTop: 8 }} onClick={() => setCleanLog([])}>清除日志</button>
            </div>
          )}
        </div>
      );
    }

    /* ========== ★★★ 新增：更多统计检验面板 ★★★ ========== */
    function StatisticalTestsPanel({ data, numericColumns, categoricalColumns, columns }) {
      const [selectedTest, setSelectedTest] = useState(null);
      const [testResult, setTestResult] = useState(null);

      // 配对t检验字段
      const [pairedCol1, setPairedCol1] = useState('');
      const [pairedCol2, setPairedCol2] = useState('');
      // Wilcoxon 字段
      const [wilxCol1, setWilxCol1] = useState('');
      const [wilxCol2, setWilxCol2] = useState('');
      // Mann-Whitney 字段
      const [mwCol1, setMwCol1] = useState('');
      const [mwCol2, setMwCol2] = useState('');
      // Kruskal-Wallis 字段
      const [kwGroupCol, setKwGroupCol] = useState('');
      const [kwTargetCol, setKwTargetCol] = useState('');
      // Friedman 字段（多列）
      const [friedmanCols, setFriedmanCols] = useState([]);
      // 卡方检验字段
      const [chiCol1, setChiCol1] = useState('');
      const [chiCol2, setChiCol2] = useState('');
      // McNemar 字段
      const [mcnemarCol1, setMcnemarCol1] = useState('');
      const [mcnemarCol2, setMcnemarCol2] = useState('');

      const runTest = () => {
        if (!selectedTest || !data || data.length === 0) return;
        const valid = data.filter(r => r != null);

        switch (selectedTest) {
          case 'pairedT': {
            if (!pairedCol1 || !pairedCol2) { setTestResult({ error: '请选择两个配对列' }); return; }
            const x = valid.map(r => toNumber(r[pairedCol1])).filter(v => v != null);
            const y = valid.map(r => toNumber(r[pairedCol2])).filter(v => v != null);
            if (x.length !== y.length) { setTestResult({ error: '两列数据量必须相等（配对数据）' }); return; }
            if (x.length < 3) { setTestResult({ error: '配对样本至少需要3对数据' }); return; }
            const result = pairedTTest(x, y);
            if (!result) { setTestResult({ error: '计算失败，数据不足' }); return; }
            setTestResult(result);
            break;
          }
          case 'wilcoxon': {
            if (!wilxCol1 || !wilxCol2) { setTestResult({ error: '请选择两个配对列' }); return; }
            const x = valid.map(r => toNumber(r[wilxCol1])).filter(v => v != null);
            const y = valid.map(r => toNumber(r[wilxCol2])).filter(v => v != null);
            if (x.length !== y.length) { setTestResult({ error: '两列数据量必须相等（配对数据）' }); return; }
            if (x.length < 5) { setTestResult({ error: 'Wilcoxon 检验至少需要5对数据' }); return; }
            const result = wilcoxonSignedRankTest(x, y);
            if (!result) { setTestResult({ error: '计算失败' }); return; }
            setTestResult(result);
            break;
          }
          case 'mannWhitney': {
            if (!mwCol1 || !mwCol2) { setTestResult({ error: '请选择两个独立数值列' }); return; }
            const a = valid.map(r => toNumber(r[mwCol1])).filter(v => v != null);
            const b = valid.map(r => toNumber(r[mwCol2])).filter(v => v != null);
            if (a.length < 1 || b.length < 1) { setTestResult({ error: '每组至少需要1个数据' }); return; }
            const result = mannWhitneyUTest(a, b);
            if (!result) { setTestResult({ error: '计算失败' }); return; }
            setTestResult(result);
            break;
          }
          case 'kruskalWallis': {
            if (!kwGroupCol || !kwTargetCol) { setTestResult({ error: '请选择分组列和目标列' }); return; }
            const groups = {};
            valid.forEach(r => { const g = String(r[kwGroupCol] ?? ''); if (!groups[g]) groups[g] = []; const v = toNumber(r[kwTargetCol]); if (v != null) groups[g].push(v); });
            const result = kruskalWallisTest(groups);
            if (!result) { setTestResult({ error: '计算失败，至少需要2组数据，每组至少1个数据' }); return; }
            setTestResult(result);
            break;
          }
          case 'friedman': {
            if (!Array.isArray(friedmanCols) || friedmanCols.length < 2) { setTestResult({ error: 'Friedman 检验需要至少选择2列（处理组）' }); return; }
            const matrix = valid.map(r => friedmanCols.map(c => toNumber(r[c])).filter(v => v != null));
            const result = friedmanTest(matrix);
            if (!result) { setTestResult({ error: '计算失败' }); return; }
            setTestResult(result);
            break;
          }
          case 'chiSquare': {
            if (!chiCol1 || !chiCol2) { setTestResult({ error: '请选择两个分类列' }); return; }
            const col1 = valid.map(r => r[chiCol1]);
            const col2 = valid.map(r => r[chiCol2]);
            const result = chiSquareTest(col1, col2);
            if (!result) { setTestResult({ error: '计算失败' }); return; }
            setTestResult(result);
            break;
          }
          case 'mcnemar': {
            if (!mcnemarCol1 || !mcnemarCol2) { setTestResult({ error: '请选择两个配对分类列' }); return; }
            const col1 = valid.map(r => r[mcnemarCol1]);
            const col2 = valid.map(r => r[mcnemarCol2]);
            const result = mcnemarTest(col1, col2);
            if (!result) { setTestResult({ error: '计算失败' }); return; }
            setTestResult(result);
            break;
          }
        }
      };

      const testDefs = [
        { key: 'pairedT', name: '配对 t 检验', desc: '检验配对样本均值差异', badge: '参数', badgeClass: 'test-badge-param', hint: '选2列：前测/后测、实验/对照', cols: 2 },
        { key: 'wilcoxon', name: 'Wilcoxon 符号秩', desc: '非参数配对检验', badge: '非参数', badgeClass: 'test-badge-nonparam', hint: '选2列（配对），数据不满足正态时使用', cols: 2 },
        { key: 'mannWhitney', name: 'Mann-Whitney U', desc: '两组独立样本非参数检验', badge: '非参数', badgeClass: 'test-badge-nonparam', hint: '选2列（独立），替代独立t检验', cols: 2 },
        { key: 'kruskalWallis', name: 'Kruskal-Wallis', desc: '多组独立样本非参数检验', badge: '非参数', badgeClass: 'test-badge-nonparam', hint: '选分组列+目标列，替代单因素ANOVA', cols: 2 },
        { key: 'friedman', name: 'Friedman 检验', desc: '多组配对样本非参数检验', badge: '非参数', badgeClass: 'test-badge-nonparam', hint: '选多个列（处理组），替代重复测量ANOVA', cols: 'multi' },
        { key: 'chiSquare', name: '卡方独立性检验', desc: '分类变量关联性检验', badge: '类别', badgeClass: 'test-badge-categorical', hint: '选2个分类列，检验列联表独立性', cols: 2 },
        { key: 'mcnemar', name: 'McNemar 检验', desc: '配对分类数据检验', badge: '类别', badgeClass: 'test-badge-categorical', hint: '选2列（配对），检验二分标志变化', cols: 2 },
      ];

      const interpret = (result) => {
        if (!result) return '';
        if (result.error) return result.error;
        const sig = result.p !== undefined && result.p < 0.05;
        const sigText = sig ? '显著差异' : '无显著差异';
        const pText = result.p !== undefined ? `p=${fmt(result.p)}` : '';
        switch (selectedTest) {
          case 'pairedT':
            return `【结论】两组配对数据均值差异${sigText}（${pText}）。平均差值：${fmt(result.dMean)}，标准差：${fmt(result.dStd)}。效应量 Cohen's d：${fmt(result.cohensD)}（${Math.abs(result.cohensD) < 0.2 ? '微弱' : Math.abs(result.cohensD) < 0.5 ? '小' : Math.abs(result.cohensD) < 0.8 ? '中' : '大'}效应）。`;
          case 'wilcoxon':
            return `【结论】两组配对数据分布差异${sigText}（${pText}）。T统计量：${fmt(result.T)}，参考值：${fmt(result.meanT)}。效应量 r：${fmt(result.r)}（${result.r < 0.1 ? '微弱' : result.r < 0.3 ? '小' : result.r < 0.5 ? '中' : '大'}效应）。`;
          case 'mannWhitney':
            return `【结论】两组独立数据分布差异${sigText}（${pText}）。U统计量：${fmt(result.U)}，平均U：${fmt(result.meanU)}。效应量 r：${fmt(result.r)}（${result.r < 0.1 ? '微弱' : result.r < 0.3 ? '小' : result.r < 0.5 ? '中' : '大'}效应）。`;
          case 'kruskalWallis':
            return `【结论】多组独立数据分布差异${sigText}（${pText}）。H统计量：${fmt(result.H)}，自由度：${result.df}。效应量 η²：${fmt(result.etaSq)}（${result.etaSq < 0.01 ? '微弱' : result.etaSq < 0.06 ? '小' : result.etaSq < 0.14 ? '中' : '大'}效应）。`;
          case 'friedman':
            return `【结论】多组配对数据分布差异${sigText}（${pText}）。χ² 统计量：${fmt(result.chiSq)}，自由度：${result.df}。Kendall's W：${fmt(result.W)}（${result.W < 0.1 ? '微弱' : result.W < 0.3 ? '小' : result.W < 0.5 ? '中' : '大'}一致性）。`;
          case 'chiSquare':
            return `【结论】两分类变量${sig ? '存在' : '不存在'}显著关联（${pText}）。χ² 统计量：${fmt(result.chiSq)}，自由度：${result.df}。Cramér's V：${fmt(result.cramersV)}（${result.cramersV < 0.1 ? '微弱' : result.cramersV < 0.3 ? '弱' : result.cramersV < 0.5 ? '中等' : '强'}关联）。`;
          case 'mcnemar':
            return `【结论】配对分类标志变化${sigText}（${pText}）。χ² 统计量：${fmt(result.chiSq)}。不一致数：B=${result.b}（变化1→2），C=${result.c}（变化2→1）。`;
          default:
            return '';
        }
      };

      const effectColor = (v) => {
        if (selectedTest === 'chiSquare') return v >= 0.5 ? '#059669' : v >= 0.3 ? '#4f46e5' : v >= 0.1 ? '#d97706' : '#9ca3af';
        return '#4f46e5';
      };

      const renderResult = () => {
        if (!testResult) return null;
        if (testResult.error) return <div className="alert alert-error" style={{ marginTop: 12 }}><span>⚠️</span><span>{testResult.error}</span></div>;

        const items = [];
        switch (selectedTest) {
          case 'pairedT':
            items.push({ key: '配对列 1', val: pairedCol1 }, { key: '配对列 2', val: pairedCol2 }, { key: '样本量 (n)', val: data.length }, { key: '平均差值', val: fmt(testResult.dMean) }, { key: '差值标准差', val: fmt(testResult.dStd) }, { key: 't 统计量', val: fmt(testResult.t) }, { key: '自由度 (df)', val: testResult.df }, { key: 'p 值', val: fmt(testResult.p), sig: testResult.p < 0.05 }, { key: "Cohen's d", val: fmt(testResult.cohensD) });
            break;
          case 'wilcoxon':
            items.push({ key: '配对列 1', val: wilxCol1 }, { key: '配对列 2', val: wilxCol2 }, { key: '样本量', val: testResult.n }, { key: 'T 统计量', val: fmt(testResult.T) }, { key: '期望 T', val: fmt(testResult.meanT) }, { key: 'Z 值', val: fmt(testResult.z) }, { key: 'p 值', val: fmt(testResult.p), sig: testResult.p < 0.05 }, { key: '效应量 r', val: fmt(testResult.r) });
            break;
          case 'mannWhitney':
            items.push({ key: '组 1 列', val: mwCol1 }, { key: '组 2 列', val: mwCol2 }, { key: '组 1 样本量', val: testResult.n1 }, { key: '组 2 样本量', val: testResult.n2 }, { key: 'U 统计量', val: fmt(testResult.U) }, { key: '期望 U', val: fmt(testResult.meanU) }, { key: 'Z 值', val: fmt(testResult.z) }, { key: 'p 值', val: fmt(testResult.p), sig: testResult.p < 0.05 }, { key: '效应量 r', val: fmt(testResult.r) });
            break;
          case 'kruskalWallis':
            items.push({ key: '分组列', val: kwGroupCol }, { key: '目标列', val: kwTargetCol }, { key: '总样本量', val: testResult.n }, { key: 'H 统计量', val: fmt(testResult.H) }, { key: '自由度', val: testResult.df }, { key: 'p 值', val: fmt(testResult.p), sig: testResult.p < 0.05 }, { key: '效应量 η²', val: fmt(testResult.etaSq) });
            break;
          case 'friedman':
            items.push({ key: '处理组列', val: friedmanCols.join(', ') }, { key: '样本量（行）', val: testResult.n }, { key: '处理组数', val: testResult.k }, { key: 'χ² 统计量', val: fmt(testResult.chiSq) }, { key: '自由度', val: testResult.df }, { key: 'p 值', val: fmt(testResult.p), sig: testResult.p < 0.05 }, { key: "Kendall's W", val: fmt(testResult.W) });
            break;
          case 'chiSquare':
            items.push({ key: '列 1（行变量）', val: chiCol1 }, { key: '列 2（列变量）', val: chiCol2 }, { key: '总样本量', val: testResult.n }, { key: 'χ² 统计量', val: fmt(testResult.chiSq) }, { key: '自由度', val: testResult.df }, { key: 'p 值', val: fmt(testResult.p), sig: testResult.p < 0.05 }, { key: "Cramér's V", val: fmt(testResult.cramersV) });
            break;
          case 'mcnemar':
            items.push({ key: '列 1（基线）', val: mcnemarCol1 }, { key: '列 2（后续）', val: mcnemarCol2 }, { key: '总配对数', val: testResult.n }, { key: 'χ² 统计量', val: fmt(testResult.chiSq) }, { key: '自由度', val: testResult.df }, { key: 'p 值', val: fmt(testResult.p), sig: testResult.p < 0.05 }, { key: '不一致：B（1→2）', val: testResult.b }, { key: '不一致：C（2→1）', val: testResult.c });
            break;
        }

        // IIFE: 页面加载时应用暗色模式
      (function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      return (
          <div>
            <div className="test-result-box">
              <div className="result-title">{testDefs.find(d => d.key === selectedTest)?.name} 结果</div>
              {items.map(item => (
                <div key={item.key} className="result-row">
                  <span className="key">{item.key}</span>
                  <span className={`val ${item.sig ? 'sig' : ''}`}>{item.val}</span>
                </div>
              ))}
            </div>
            <div className="test-interpretation">
              <div className="interp-title">📋 结果解读</div>
              <div className="interp-text">{interpret(testResult)}</div>
            </div>
          </div>
        );
      };

      if (!data || data.length === 0) return null;

      // IIFE: 页面加载时应用暗色模式
      (function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      return (
        <div>
          {/* 选择检验类型 */}
          <div className="test-grid">
            {testDefs.map(td => (
              <div key={td.key} className={`test-card ${selectedTest === td.key ? 'selected' : ''}`} onClick={() => { setSelectedTest(td.key); setTestResult(null); }}>
                <div className="test-name">{td.name}</div>
                <div className="test-desc">{td.desc}</div>
                <span className={`test-badge ${td.badgeClass}`}>{td.badge}</span>
              </div>
            ))}
          </div>

          {/* 字段配置区 */}
          {selectedTest && (
            <div style={{ marginBottom: 16, padding: 16, background: 'var(--gray-50)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--gray-200)' }}>
              <div style={{ fontWeight: 600, fontSize: '.9rem', color: 'var(--gray-700)', marginBottom: 12 }}>
                📌 {testDefs.find(d => d.key === selectedTest)?.name} — 参数配置
              </div>
              <div className="transform-hint">{testDefs.find(d => d.key === selectedTest)?.hint}</div>

              {(selectedTest === 'pairedT' || selectedTest === 'wilcoxon') && (
                <div className="grid-two">
                  <div className="form-row"><label>配对列 1</label><select value={selectedTest === 'pairedT' ? pairedCol1 : wilxCol1} onChange={e => { if (selectedTest === 'pairedT') setPairedCol1(e.target.value); else setWilxCol1(e.target.value); }}><option value="">请选择</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  <div className="form-row"><label>配对列 2</label><select value={selectedTest === 'pairedT' ? pairedCol2 : wilxCol2} onChange={e => { if (selectedTest === 'pairedT') setPairedCol2(e.target.value); else setWilxCol2(e.target.value); }}><option value="">请选择</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                </div>
              )}

              {selectedTest === 'mannWhitney' && (
                <div className="grid-two">
                  <div className="form-row"><label>组 1 数值列</label><select value={mwCol1} onChange={e => setMwCol1(e.target.value)}><option value="">请选择</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  <div className="form-row"><label>组 2 数值列</label><select value={mwCol2} onChange={e => setMwCol2(e.target.value)}><option value="">请选择</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                </div>
              )}

              {selectedTest === 'kruskalWallis' && (
                <div className="grid-two">
                  <div className="form-row"><label>分组列（分类）</label><select value={kwGroupCol} onChange={e => setKwGroupCol(e.target.value)}><option value="">请选择</option>{[...categoricalColumns, ...numericColumns].map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  <div className="form-row"><label>目标列（数值）</label><select value={kwTargetCol} onChange={e => setKwTargetCol(e.target.value)}><option value="">请选择</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                </div>
              )}

              {selectedTest === 'friedman' && (
                <div className="form-row">
                  <label>处理组列（多选，至少2列）</label>
                  <select multiple size={Math.min(8, numericColumns.length)} value={friedmanCols} onChange={e => setFriedmanCols(Array.from(e.target.selectedOptions, o => o.value))}>
                    {numericColumns.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                  <div className="transform-hint">从同一受试者的不同条件下选择数值列，每列代表一个处理组。</div>
                </div>
              )}

              {(selectedTest === 'chiSquare' || selectedTest === 'mcnemar') && (
                <div className="grid-two">
                  <div className="form-row"><label>分类列 1</label><select value={selectedTest === 'chiSquare' ? chiCol1 : mcnemarCol1} onChange={e => { if (selectedTest === 'chiSquare') setChiCol1(e.target.value); else setMcnemarCol1(e.target.value); }}><option value="">请选择</option>{[...categoricalColumns, ...numericColumns].map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  <div className="form-row"><label>分类列 2</label><select value={selectedTest === 'chiSquare' ? chiCol2 : mcnemarCol2} onChange={e => { if (selectedTest === 'chiSquare') setChiCol2(e.target.value); else setMcnemarCol2(e.target.value); }}><option value="">请选择</option>{[...categoricalColumns, ...numericColumns].map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                </div>
              )}

              <button className="btn btn-primary" onClick={runTest} style={{ marginTop: 8 }}>▶ 运行检验</button>
            </div>
          )}

          {/* 结果展示 */}
          {testResult && renderResult()}
        </div>
      );
    }

    /* ========== ★★★ 新增：数据转换面板 ★★★ ========== */
    function DataTransformationPanel({ data, columns, numericColumns, categoricalColumns, onDataChange }) {
      const [op, setOp] = useState('math');
      const [history, setHistory] = useState([]);

      const [glossaryOpen, setGlossaryOpen] = useState(false);


      // Math ops
      const [mathCol, setMathCol] = useState('');
      const [mathOp, setMathOp] = useState('add');
      const [mathConst, setMathConst] = useState('1');
      const [mathCol2, setMathCol2] = useState('');
      const [mathMode, setMathMode] = useState('const'); // 'const' or 'col'

      // Log/exp
      const [logCol, setLogCol] = useState('');
      const [logOp, setLogOp] = useState('log');

      // Standardization
      const [stdCol, setStdCol] = useState('');
      const [stdOp, setStdOp] = useState('zscore');

      // Binning
      const [binCol, setBinCol] = useState('');
      const [binType, setBinType] = useState('equalWidth');
      const [binNum, setBinNum] = useState('4');
      const [binBoundStr, setBinBoundStr] = useState('');

      // One-hot
      const [oneHotCol, setOneHotCol] = useState('');

      // Lag/lead
      const [lagCol, setLagCol] = useState('');
      const [lagAmount, setLagAmount] = useState('1');

      // Cumulative
      const [cumCol, setCumCol] = useState('');
      const [cumOp, setCumOp] = useState('sum');

      const [preview, setPreview] = useState(null);
      const [newColName, setNewColName] = useState('');

      const generateNewColName = (base) => {
        const existing = columns.map(c => c);
        let candidate = base;
        let n = 1;
        while (existing.includes(candidate)) { candidate = `${base}_${n}`; n++; }
        return candidate;
      };

      // 计算预览
      const computePreview = () => {
        if (!data || data.length === 0) return;
        let previewData = data.slice(0, 5);
        let newCol = '';
        let values = [];

        switch (op) {
          case 'math': {
            if (!mathCol) return;
            const colVals = data.map(r => toNumber(r[mathCol]));
            if (mathMode === 'const') {
              const c = Number(mathConst);
              newCol = generateNewColName(`${mathCol}_${mathOp}`);
              values = colVals.map(v => v != null ? eval(`${v} ${mathOp.replace('pow', '**')} ${c}`) : null);
            } else {
              if (!mathCol2) return;
              newCol = generateNewColName(`${mathCol}_${mathOp}_${mathCol2}`);
              const col2Vals = data.map(r => toNumber(r[mathCol2]));
              values = colVals.map((v, i) => v != null && col2Vals[i] != null ? eval(`${v} ${mathOp} ${col2Vals[i]}`) : null);
            }
            break;
          }
          case 'logExp': {
            if (!logCol) return;
            const colVals = data.map(r => toNumber(r[logCol]));
            newCol = generateNewColName(`${logCol}_${logOp}`);
            values = colVals.map(v => {
              if (v == null) return null;
              switch (logOp) {
                case 'log': return v > 0 ? Math.log(v) : null;
                case 'log10': return v > 0 ? Math.log10(v) : null;
                case 'sqrt': return v >= 0 ? Math.sqrt(v) : null;
                case 'square': return v != null ? v * v : null;
                case 'exp': return Math.exp(Math.min(v, 700));
                default: return null;
              }
            });
            break;
          }
          case 'standardize': {
            if (!stdCol) return;
            const colVals = data.map(r => toNumber(r[stdCol])).filter(v => v != null);
            const m = mean(colVals), sd = stdev(colVals);
            const allVals = data.map(r => toNumber(r[stdCol]));
            newCol = generateNewColName(`${stdCol}_${stdOp}`);
            if (stdOp === 'zscore') {
              values = allVals.map(v => v != null ? (sd > 0 ? (v - m) / sd : 0) : null);
            } else {
              const mn = Math.min(...colVals), mx = Math.max(...colVals);
              values = allVals.map(v => v != null && mx !== mn ? (v - mn) / (mx - mn) : null);
            }
            break;
          }
          case 'binning': {
            if (!binCol) return;
            const colVals = data.map(r => toNumber(r[binCol])).filter(v => v != null);
            if (colVals.length === 0) return;
            const allVals = data.map(r => toNumber(r[binCol]));
            newCol = generateNewColName(`${binCol}_bin`);
            if (binType === 'equalWidth') {
              const n = parseInt(binNum) || 4;
              const mn = Math.min(...colVals), mx = Math.max(...colVals);
              const width = (mx - mn) / n;
              const edges = Array.from({ length: n + 1 }, (_, i) => mn + i * width);
              edges[n] = mx + 0.0001; // 确保包含最大值
              values = allVals.map(v => {
                if (v == null) return null;
                for (let i = 0; i < n; i++) if (v >= edges[i] && v < edges[i + 1]) return `区间${i + 1} [${edges[i].toFixed(2)}-${edges[i + 1].toFixed(2)})`;
                return `区间${n} [${edges[n - 1].toFixed(2)}-${edges[n].toFixed(2)})`;
              });
            } else if (binType === 'equalFreq') {
              const n = parseInt(binNum) || 4;
              const edges = Array.from({ length: n + 1 }, (_, i) => quantile(colVals, i / n));
              values = allVals.map(v => {
                if (v == null) return null;
                for (let i = 0; i < n; i++) if (v >= edges[i] && v <= edges[i + 1]) return `区间${i + 1} [${edges[i].toFixed(2)}-${edges[i + 1].toFixed(2)})`;
                return null;
              });
            } else {
              // 自定义边界
              const edges = binBoundStr.split(',').map(s => parseFloat(s.trim())).filter(x => !isNaN(x)).sort((a, b) => a - b);
              if (edges.length < 2) return;
              const labels = edges.map((e, i) => i === 0 ? `≤${e}` : i === edges.length - 1 ? `>${edges[i - 1]}` : `${edges[i - 1]}-${e}`);
              values = allVals.map(v => {
                if (v == null) return null;
                for (let i = edges.length - 1; i >= 0; i--) if (v > edges[i - 1]) return labels[i];
                return labels[0];
              });
            }
            break;
          }
          case 'oneHot': {
            if (!oneHotCol) return;
            const uniqueVals = [...new Set(data.map(r => String(r[oneHotCol] ?? '')))].filter(v => v !== '');
            const result = {};
            uniqueVals.forEach(v => { result[generateNewColName(`${oneHotCol}_${v}`)] = data.map(r => String(r[oneHotCol] ?? '') === v ? 1 : 0); });
            setPreview({ type: 'oneHot', data: result, labels: uniqueVals });
            return;
          }
          case 'lagLead': {
            if (!lagCol) return;
            const allVals = data.map(r => r[lagCol]);
            const n = parseInt(lagAmount) || 1;
            newCol = generateNewColName(`${lagCol}_lag${n}`);
            values = allVals.map((v, i) => i >= n ? allVals[i - n] : null);
            break;
          }
          case 'cumulative': {
            if (!cumCol) return;
            const allVals = data.map(r => toNumber(r[cumCol]));
            newCol = generateNewColName(`${cumCol}_${cumOp}`);
            if (cumOp === 'sum') {
              let s = 0;
              values = allVals.map(v => { if (v != null) s += v; return s; });
            } else if (cumOp === 'mean') {
              let s = 0, c = 0;
              values = allVals.map(v => { if (v != null) { s += v; c++; } return c > 0 ? s / c : null; });
            } else {
              values = allVals.map(v => v != null ? 1 : 0).reduce((acc, v, i) => { acc.push((acc[i - 1] || 0) + v); return acc; }, []);
            }
            break;
          }
        }

        if (newCol && values.length > 0) {
          setNewColName(newCol);
          setPreview({ type: 'single', colName: newCol, values: values.map((v, i) => ({ original: data[i] && data[i][columns[0]] !== undefined ? JSON.stringify(Object.fromEntries(Object.keys(data[i]).map((k, ki) => [k, data[i][k]]).slice(0, Math.min(3, Object.keys(data[i]).length))) : '', newVal: v })) });
        }
      };

      const applyTransform = () => {
        if (!preview || !data) return;
        if (preview.type === 'oneHot') {
          const newData = data.map((row, i) => {
            const newRow = { ...row };
            Object.entries(preview.data).forEach(([colName, vals]) => { newRow[colName] = vals[i]; });
            return newRow;
          });
          onDataChange(newData);
          setHistory(prev => [...prev, { label: `哑变量：${preview.labels.join(', ')}`, preview: null }]);
        } else if (preview.type === 'single') {
          const newData = data.map((row, i) => ({ ...row, [newColName]: preview.values[i] }));
          onDataChange(newData);
          setHistory(prev => [...prev, { label: `新增列：${newColName}`, col: newColName, preview: null }]);
        }
        setPreview(null);
        setNewColName('');
      };

      const undoTransform = (idx) => {
        const item = history[idx];
        if (!item) return;
        // 简单撤销：移除历史项对应的新增列
        // 实际应用中需要存储变换的反向操作
        setHistory(prev => prev.filter((_, i) => i !== idx));
      };

      const opTabs = [
        { key: 'math', label: '📐 数学运算' },
        { key: 'logExp', label: '📊 对数/指数' },
        { key: 'standardize', label: '⚖ 标准化/归一化' },
        { key: 'binning', label: '📦 分箱' },
        { key: 'oneHot', label: '🔲 哑变量编码' },
        { key: 'lagLead', label: '⏪ 滞后/领先' },
        { key: 'cumulative', label: '➕ 累计运算' },
      ];

      if (!data || data.length === 0) return null;

      // IIFE: 页面加载时应用暗色模式
      (function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      return (
        <div>
          {/* 操作选择标签页 */}
          <div className="transform-op-tabs">
            {opTabs.map(t => (
              <button key={t.key} className={`transform-op-tab ${op === t.key ? 'active' : ''}`} onClick={() => { setOp(t.key); setPreview(null); }}>
                {t.label}
              </button>
            ))}
          </div>

          {/* 各操作配置 */}
          <div className="transform-section">
            <h3>{opTabs.find(t => t.key === op)?.label}</h3>

            {op === 'math' && (
              <>
                <div className="transform-hint">对数值列进行数学运算，生成新列（保留原列）。</div>
                <div className="transform-config">
                  <div className="form-row"><label>操作列</label><select value={mathCol} onChange={e => setMathCol(e.target.value)}><option value="">请选择数值列</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  <div className="form-row"><label>运算方式</label><select value={mathMode} onChange={e => setMathMode(e.target.value)}><option value="const">与常数运算</option><option value="col">与另一列运算</option></select></div>
                  {mathMode === 'const' ? (
                    <>
                      <div className="form-row"><label>运算符</label><select value={mathOp} onChange={e => setMathOp(e.target.value)}><option value="add">加 (+)</option><option value="sub">减 (−)</option><option value="mul">乘 (×)</option><option value="div">除 (÷)</option><option value="pow">幂 (^)</option></select></div>
                      <div className="form-row"><label>常数</label><input type="number" value={mathConst} onChange={e => setMathConst(e.target.value)} placeholder="输入数值" /></div>

          {/* 暗色模式切换按钮 */}
          <button className="glossary-button" onClick={() => setGlossaryOpen(true)} title="打开统计术语表">
            📖 统计术语表
          </button>

          <button className="dark-mode-toggle" onClick={() => setDarkMode(d => !d)} title={darkMode ? "切换到亮色模式" : "切换到暗色模式"}>
            {darkMode ? "☀️" : "🌙"}
          </button>

                    </>
                  ) : (
                    <div className="form-row"><label>第二列</label><select value={mathCol2} onChange={e => setMathCol2(e.target.value)}><option value="">请选择数值列</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  )}
                </div>
              </>
            )}

            {op === 'logExp' && (
              <>
                <div className="transform-hint">对数、指数、幂变换。注意：log 类变换需要正值。</div>
                <div className="transform-config">
                  <div className="form-row"><label>数值列</label><select value={logCol} onChange={e => setLogCol(e.target.value)}><option value="">请选择数值列</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  <div className="form-row"><label>变换类型</label><select value={logOp} onChange={e => setLogOp(e.target.value)}><option value="log">自然对数 (ln)</option><option value="log10">常用对数 (log₁₀)</option><option value="sqrt">平方根 (√)</option><option value="square">平方 (x²)</option><option value="exp">指数 (eˣ)</option></select></div>
                </div>
              </>
            )}

            {op === 'standardize' && (
              <>
                <div className="transform-hint">数据标准化或归一化，生成无量纲的新列。</div>
                <div className="transform-config">
                  <div className="form-row"><label>数值列</label><select value={stdCol} onChange={e => setStdCol(e.target.value)}><option value="">请选择数值列</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  <div className="form-row"><label>方法</label><select value={stdOp} onChange={e => setStdOp(e.target.value)}><option value="zscore">Z-Score 标准化</option><option value="minmax">Min-Max 归一化</option></select></div>
                  <div style={{ fontSize: '.8rem', color: 'var(--gray-500)', alignSelf: 'center' }}>
                    {stdOp === 'zscore' ? '→ 转为均值0、标准差1的分布' : '→ 转为 [0, 1] 区间的分布'}
                  </div>
                </div>
              </>
            )}

            {op === 'binning' && (
              <>
                <div className="transform-hint">将连续数值离散化为分类区间。</div>
                <div className="transform-config">
                  <div className="form-row"><label>数值列</label><select value={binCol} onChange={e => setBinCol(e.target.value)}><option value="">请选择数值列</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  <div className="form-row"><label>分箱方式</label><select value={binType} onChange={e => setBinType(e.target.value)}><option value="equalWidth">等宽分箱</option><option value="equalFreq">等频分箱</option><option value="custom">自定义边界</option></select></div>
                  {binType !== 'custom' && (
                    <div className="form-row"><label>箱数</label><input type="number" min={2} max={20} value={binNum} onChange={e => setBinNum(e.target.value)} /></div>
                  )}
                  {binType === 'custom' && (
                    <div className="form-row" style={{ gridColumn: '1 / -1' }}><label>自定义边界（逗号分隔，如 10,20,30,40）</label><input type="text" value={binBoundStr} onChange={e => setBinBoundStr(e.target.value)} placeholder="10,20,30,40" /></div>
                  )}
                </div>
              </>
            )}

            {op === 'oneHot' && (
              <>
                <div className="transform-hint">将分类变量转换为哑变量（One-Hot）编码，每个类别生成一列。</div>
                <div className="transform-config">
                  <div className="form-row"><label>分类列</label><select value={oneHotCol} onChange={e => setOneHotCol(e.target.value)}><option value="">请选择分类列</option>{[...categoricalColumns, ...numericColumns].map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  {oneHotCol && (() => {
                    const unique = [...new Set(data.map(r => String(r[oneHotCol] ?? '')))].filter(v => v !== '');
                    return <div style={{ fontSize: '.85rem', color: 'var(--gray-600)' }}>将生成 {unique.length} 个哑变量列：{unique.slice(0, 5).map(v => v).join(', ')}{unique.length > 5 ? '...' : ''}</div>;
                  })()}
                </div>
              </>
            )}

            {op === 'lagLead' && (
              <>
                <div className="transform-hint">时间序列操作：滞后（Lag）将值向下移动，领先（Lead）向上移动。</div>
                <div className="transform-config">
                  <div className="form-row"><label>数值列</label><select value={lagCol} onChange={e => setLagCol(e.target.value)}><option value="">请选择数值列</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  <div className="form-row"><label>偏移量（行数）</label><input type="number" min={1} max={data.length - 1} value={lagAmount} onChange={e => setLagAmount(e.target.value)} /></div>
                </div>
              </>
            )}

            {op === 'cumulative' && (
              <>
                <div className="transform-hint">沿数据方向（从上到下）计算累计值。</div>
                <div className="transform-config">
                  <div className="form-row"><label>数值列</label><select value={cumCol} onChange={e => setCumCol(e.target.value)}><option value="">请选择数值列</option>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                  <div className="form-row"><label>累计方式</label><select value={cumOp} onChange={e => setCumOp(e.target.value)}><option value="sum">累计求和</option><option value="mean">累计均值</option><option value="count">累计计数（非空）</option></select></div>
                </div>
              </>
            )}

            <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
              <button className="btn btn-outline btn-sm" onClick={computePreview}>👁 预览结果</button>

                <div key={i} className="transform-history-item">
                  <span className="hist-label">{item.label}</span>

                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ========== 数据可视化组件 ========== */
    function DataVisualizationPanel({ data, numericColumns, categoricalColumns, columns }) {
      const [chartType, setChartType] = useState('histogram');
      const chartRef = useRef(null);
      const heatmapRef = useRef(null);
      const chartInstanceRef = useRef(null);

      const [histCol, setHistCol] = useState('');
      const [histBins, setHistBins] = useState(20);
      const [boxCols, setBoxCols] = useState([]);
      const [scatterX, setScatterX] = useState('');
      const [scatterY, setScatterY] = useState('');
      const [barCatCol, setBarCatCol] = useState('');
      const [barNumCol, setBarNumCol] = useState('');
      const [barAgg, setBarAgg] = useState('mean');
      const [pieCol, setPieCol] = useState('');
      const [heatmapCols, setHeatmapCols] = useState([]);
      const [qqCol, setQqCol] = useState('');

      useEffect(() => {
        if (numericColumns.length > 0 && !histCol) setHistCol(numericColumns[0]);
        if (numericColumns.length > 0 && !scatterX) setScatterX(numericColumns[0]);
        if (numericColumns.length > 1 && !scatterY) setScatterY(numericColumns[1]);
        if (numericColumns.length > 0 && !qqCol) setQqCol(numericColumns[0]);
        if (categoricalColumns.length > 0 && !barCatCol) setBarCatCol(categoricalColumns[0]);
        if (categoricalColumns.length > 0 && !pieCol) setPieCol(categoricalColumns[0]);
        if (numericColumns.length > 0 && !barNumCol) setBarNumCol(numericColumns[0]);
        if (numericColumns.length > 0 && boxCols.length === 0) setBoxCols(numericColumns.slice(0, Math.min(3, numericColumns.length)));
        if (numericColumns.length >= 2 && heatmapCols.length === 0) setHeatmapCols(numericColumns.slice(0, Math.min(5, numericColumns.length)));
      }, [numericColumns, categoricalColumns]);

      const destroyChart = () => {
        if (chartInstanceRef.current) { chartInstanceRef.current.destroy(); chartInstanceRef.current = null; }
      };

      const inverseNormalCDF = (p) => {
        if (p <= 0) return -Infinity;
        if (p >= 1) return Infinity;
        if (p === 0.5) return 0;
        const a = [-3.969683028665376e1, 2.209460984245205e2, -2.759285104469687e2, 1.383577518672690e2, -3.066479806614716e1, 2.506628277459239e0];
        const b = [-5.447609879822406e1, 1.615858368580409e2, -1.556989798598866e2, 6.680131188771972e1, -1.328068155288572e1];
        const c = [-7.784894002430293e-3, -3.223964580411365e-1, -2.400758277161838e0, -2.549732539343734e0, 4.374664141464968e0, 2.938163982698783e0];
        const d = [7.784695709041462e-3, 3.224671290700398e-1, 2.445134137142996e0, 3.754408661907416e0];
        const pLow = 0.02425, pHigh = 1 - pLow;
        let q, r;
        if (p < pLow) {
          q = Math.sqrt(-2 * Math.log(p));
          // IIFE: 页面加载时应用暗色模式
      (function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      return (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) / ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
        } else if (p <= pHigh) {
          q = p - 0.5; r = q * q;
          // IIFE: 页面加载时应用暗色模式
      (function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      return (((((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4]) * r + a[5]) * q / (((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4]) * r + 1);
        } else {
          q = Math.sqrt(-2 * Math.log(1 - p));
          return -(((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) / ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
        }
      };

      const drawChart = useCallback(() => {
        if (!data || data.length === 0) return;
        destroyChart();
        if (chartType === 'heatmap') { drawHeatmap(); return; }
        const ctx = chartRef.current?.getContext('2d');
        if (!ctx) return;
        const colors = ['#4f46e5', '#7c3aed', '#059669', '#d97706', '#dc2626', '#0284c7', '#c026d3', '#ea580c', '#0d9488', '#475569'];

        let config;
        switch (chartType) {
          case 'histogram': {
            if (!histCol) return;
            const vals = data.map(r => toNumber(r[histCol])).filter(v => v != null);
            if (vals.length === 0) return;
            const min = Math.min(...vals), max = Math.max(...vals);
            const binWidth = (max - min) / histBins || 1;
            const bins = Array(histBins).fill(0);
            const labels = [];
            vals.forEach(v => { const idx = Math.min(Math.floor((v - min) / binWidth), histBins - 1); bins[idx]++; });
            for (let i = 0; i < histBins; i++) labels.push((min + i * binWidth).toFixed(1));
            config = { type: 'bar', data: { labels, datasets: [{ label: histCol, data: bins, backgroundColor: colors[0] + '99', borderColor: colors[0], borderWidth: 1 }] }, options: { responsive: true, plugins: { title: { display: true, text: `${histCol} 频率分布直方图` } }, scales: { x: { title: { display: true, text: histCol } }, y: { title: { display: true, text: '频数' } } } } };
            break;
          }
          case 'boxplot': {
            if (boxCols.length === 0) return;
            const datasets = boxCols.map((col, i) => {
              const vals = data.map(r => toNumber(r[col])).filter(v => v != null).sort((a, b) => a - b);
              if (vals.length === 0) return null;
              const q1 = quantile(vals, 0.25), med = median(vals), q3 = quantile(vals, 0.75), min = Math.min(...vals), max = Math.max(...vals);
              return { col, q1, med, q3, min, max };
            }).filter(Boolean);
            config = { type: 'bar', data: { labels: datasets.map(d => d.col), datasets: [
              { label: '最小值→Q1', data: datasets.map(d => d.q1 - d.min), backgroundColor: colors[2] + '66', stack: 'box' },
              { label: 'Q1→中位数', data: datasets.map(d => d.med - d.q1), backgroundColor: colors[0] + '99', stack: 'box' },
              { label: '中位数→Q3', data: datasets.map(d => d.q3 - d.med), backgroundColor: colors[1] + '99', stack: 'box' },
              { label: 'Q3→最大值', data: datasets.map(d => d.max - d.q3), backgroundColor: colors[2] + '66', stack: 'box' },
            ] }, options: { responsive: true, indexAxis: 'y', plugins: { title: { display: true, text: '箱线图（堆叠视图）' }, tooltip: { callbacks: { label: (ctx) => { const d = datasets[ctx.dataIndex]; return d ? `最小:${fmt(d.min)} Q1:${fmt(d.q1)} 中位:${fmt(d.med)} Q3:${fmt(d.q3)} 最大:${fmt(d.max)}` : ''; } } } }, scales: { x: { stacked: true, title: { display: true, text: '值' } }, y: { stacked: true } } } };
            break;
          }
          case 'scatter': {
            if (!scatterX || !scatterY) return;
            const pts = data.map(r => { const x = toNumber(r[scatterX]), y = toNumber(r[scatterY]); return x != null && y != null ? { x, y } : null; }).filter(Boolean);
            config = { type: 'scatter', data: { datasets: [{ label: `${scatterX} vs ${scatterY}`, data: pts, backgroundColor: colors[0] + '88', pointRadius: 4 }] }, options: { responsive: true, plugins: { title: { display: true, text: `${scatterX} vs ${scatterY} 散点图` } }, scales: { x: { title: { display: true, text: scatterX } }, y: { title: { display: true, text: scatterY } } } } };
            break;
          }
          case 'bar': {
            if (!barCatCol || !barNumCol) return;
            const groups = {};
            data.forEach(r => { const g = r[barCatCol]; if (g != null) { if (!groups[g]) groups[g] = []; const v = toNumber(r[barNumCol]); if (v != null) groups[g].push(v); } });
            const labels = Object.keys(groups);
            const aggData = labels.map(g => barAgg === 'mean' ? mean(groups[g]) : groups[g].reduce((a, b) => a + b, 0));
            config = { type: 'bar', data: { labels, datasets: [{ label: `${barNumCol} (${barAgg === 'mean' ? '均值' : '求和'})`, data: aggData, backgroundColor: labels.map((_, i) => colors[i % colors.length] + '99'), borderColor: labels.map((_, i) => colors[i % colors.length]), borderWidth: 1 }] }, options: { responsive: true, plugins: { title: { display: true, text: `${barCatCol} 分组 - ${barNumCol} ${barAgg === 'mean' ? '均值' : '求和'}` } }, scales: { x: { title: { display: true, text: barCatCol } }, y: { title: { display: true, text: barNumCol } } } } };
            break;
          }
          case 'pie': {
            if (!pieCol) return;
            const freq = {};
            data.forEach(r => { const v = r[pieCol]; if (v != null) freq[v] = (freq[v] || 0) + 1; });
            const labels = Object.keys(freq), values = Object.values(freq);
            config = { type: 'pie', data: { labels, datasets: [{ data: values, backgroundColor: labels.map((_, i) => colors[i % colors.length] + 'cc') }] }, options: { responsive: true, plugins: { title: { display: true, text: `${pieCol} 分布饼图` }, legend: { position: 'right' } } } };
            break;
          }
          case 'qq': {
            if (!qqCol) return;
            const vals = data.map(r => toNumber(r[qqCol])).filter(v => v != null).sort((a, b) => a - b);
            if (vals.length < 3) return;
            const n = vals.length;
            const m = mean(vals), sd = stdev(vals);
            const pts = vals.map((v, i) => { const p = (i + 0.5) / n; const z = inverseNormalCDF(p); return { x: z, y: sd > 0 ? (v - m) / sd : 0 }; });
            const lineData = [{ x: pts[0].x, y: pts[0].x }, { x: pts[pts.length - 1].x, y: pts[pts.length - 1].x }];
            config = { type: 'scatter', data: { datasets: [
              { label: 'QQ 点', data: pts, backgroundColor: colors[0] + '88', pointRadius: 3 },
              { label: '参考线 (y=x)', data: lineData, type: 'line', borderColor: '#dc2626', borderWidth: 2, pointRadius: 0, fill: false },
            ] }, options: { responsive: true, plugins: { title: { display: true, text: `${qqCol} Q-Q 图（正态性检验）` } }, scales: { x: { title: { display: true, text: '理论分位数' } }, y: { title: { display: true, text: '样本分位数' } } } } };
            break;
          }
          default: return;
        }
        if (config) chartInstanceRef.current = new Chart(ctx, config);
      }, [chartType, data, histCol, histBins, boxCols, scatterX, scatterY, barCatCol, barNumCol, barAgg, pieCol, qqCol]);

      const drawHeatmap = useCallback(() => {
        if (heatmapCols.length < 2) return;
        const canvas = heatmapRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const n = heatmapCols.length;
        const cellSize = Math.min(80, Math.max(40, 500 / n));
        const labelWidth = 80;
        const w = labelWidth + n * cellSize + 60;
        const h = labelWidth + n * cellSize + 40;
        canvas.width = w; canvas.height = h;
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);

        const matrix = [];
        for (let i = 0; i < n; i++) {
          matrix[i] = [];
          for (let j = 0; j < n; j++) {
            if (i === j) { matrix[i][j] = 1; continue; }
            const pairs = data.map(r => { const a = toNumber(r[heatmapCols[i]]), b = toNumber(r[heatmapCols[j]]); return a != null && b != null ? [a, b] : null; }).filter(Boolean);
            matrix[i][j] = pairs.length > 1 ? pearsonCorr(pairs.map(p => p[0]), pairs.map(p => p[1])) : 0;
          }
        }

        for (let i = 0; i < n; i++) {
          for (let j = 0; j < n; j++) {
            const r = matrix[i][j];
            const x = labelWidth + j * cellSize;
            const y = labelWidth + i * cellSize;
            const intensity = Math.abs(r);
            if (r >= 0) ctx.fillStyle = `rgba(79, 70, 229, ${intensity * 0.8 + 0.1})`;
            else ctx.fillStyle = `rgba(220, 38, 38, ${intensity * 0.8 + 0.1})`;
            ctx.fillRect(x, y, cellSize, cellSize);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(x, y, cellSize, cellSize);
            ctx.fillStyle = intensity > 0.5 ? '#fff' : '#333';
            ctx.font = `${Math.min(12, cellSize / 4)}px sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(r.toFixed(2), x + cellSize / 2, y + cellSize / 2);
          }
        }

        ctx.fillStyle = '#333'; ctx.font = `${Math.min(11, cellSize / 4)}px sans-serif`;
        for (let i = 0; i < n; i++) {
          ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
          ctx.fillText(heatmapCols[i].slice(0, 8), labelWidth - 4, labelWidth + i * cellSize + cellSize / 2);
          ctx.save(); ctx.translate(labelWidth + i * cellSize + cellSize / 2, labelWidth - 4);
          ctx.rotate(-Math.PI / 4); ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
          ctx.fillText(heatmapCols[i].slice(0, 8), 0, 0); ctx.restore();
        }
      }, [data, heatmapCols]);

      useEffect(() => {
        if (data && data.length > 0) drawChart();
        // IIFE: 页面加载时应用暗色模式
      (function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      return () => destroyChart();
      }, [drawChart]);

      if (!data || data.length === 0) return null;

      const chartTypes = [
        { key: 'histogram', label: '📊 直方图' },
        { key: 'boxplot', label: '📦 箱线图' },
        { key: 'scatter', label: '⚬ 散点图' },
        { key: 'bar', label: '📊 柱状图' },
        { key: 'pie', label: '🥧 饼图' },
        { key: 'heatmap', label: '🔥 热力图' },
        { key: 'qq', label: '📈 QQ图' },
      ];

      // IIFE: 页面加载时应用暗色模式
      (function() {
        if (localStorage.getItem("darkMode") === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      return (
        <div>
          <div className="chart-type-tabs">
            {chartTypes.map(t => (<button key={t.key} className={`chart-type-tab ${chartType === t.key ? 'active' : ''}`} onClick={() => setChartType(t.key)}>{t.label}</button>))}
          </div>

          <div className="grid-two" style={{ marginBottom: 16 }}>
            {chartType === 'histogram' && (<><div className="form-row"><label>数值列</label><select value={histCol} onChange={e => setHistCol(e.target.value)}>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div><div className="form-row"><label>分箱数</label><input type="number" min={5} max={100} value={histBins} onChange={e => setHistBins(Number(e.target.value))} /></div></>)}
            {chartType === 'boxplot' && (<div className="form-row" style={{ gridColumn: '1 / -1' }}><label>数值列（多选）</label><select multiple size={Math.min(6, numericColumns.length)} value={boxCols} onChange={e => setBoxCols(Array.from(e.target.selectedOptions, o => o.value))}>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>)}
            {chartType === 'scatter' && (<><div className="form-row"><label>X 轴</label><select value={scatterX} onChange={e => setScatterX(e.target.value)}>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div><div className="form-row"><label>Y 轴</label><select value={scatterY} onChange={e => setScatterY(e.target.value)}>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div></>)}
            {chartType === 'bar' && (<><div className="form-row"><label>分类列</label><select value={barCatCol} onChange={e => setBarCatCol(e.target.value)}>{[...categoricalColumns, ...numericColumns].map(c => <option key={c} value={c}>{c}</option>)}</select></div><div className="form-row"><label>数值列</label><select value={barNumCol} onChange={e => setBarNumCol(e.target.value)}>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div><div className="form-row"><label>聚合方式</label><select value={barAgg} onChange={e => setBarAgg(e.target.value)}><option value="mean">均值</option><option value="sum">求和</option></select></div></>)}
            {chartType === 'pie' && (<div className="form-row"><label>分类列</label><select value={pieCol} onChange={e => setPieCol(e.target.value)}>{[...categoricalColumns, ...numericColumns].map(c => <option key={c} value={c}>{c}</option>)}</select></div>)}
            {chartType === 'heatmap' && (<div className="form-row" style={{ gridColumn: '1 / -1' }}><label>数值列（多选）</label><select multiple size={Math.min(8, numericColumns.length)} value={heatmapCols} onChange={e => setHeatmapCols(Array.from(e.target.selectedOptions, o => o.value))}>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>)}
            {chartType === 'qq' && (<div className="form-row"><label>数值列</label><select value={qqCol} onChange={e => setQqCol(e.target.value)}>{numericColumns.map(c => <option key={c} value={c}>{c}</option>)}</select></div>)}
          </div>

          <div className="chart-canvas-wrapper">
            {chartType === 'heatmap' ? (<canvas ref={heatmapRef} className="heatmap-canvas" />) : (<canvas ref={chartRef} />)}
          </div>
          <div style={{ marginTop: 12, textAlign: 'center' }}>
            <button className="btn btn-outline btn-sm" onClick={() => {
              const canvas = chartType === 'heatmap' ? heatmapRef.current : chartRef.current;
              if (!canvas) return;
              const scale = 2;
              const offscreen = document.createElement('canvas');
              offscreen.width = canvas.width * scale;
              offscreen.height = canvas.height * scale;
              const ctx2 = offscreen.getContext('2d');
              ctx2.scale(scale, scale);
              ctx2.fillStyle = '#fff';
              ctx2.fillRect(0, 0, canvas.width, canvas.height);
              ctx2.drawImage(canvas, 0, 0);
              const link = document.createElement('a');
              link.download = `chart-${chartType}-${Date.now()}.jpg`;
              link.href = offscreen.toDataURL('image/jpeg', 0.95);
              link.click();
            }}>🖼️ 导出JPG</button>
          </div>
        </div>
      );
    }

    /* ========== 透视表面板 ========== */
    function PivotTablePanel({ data, columns, numericColumns, categoricalColumns }) {
      const [rowField, setRowField] = useState('');
      const [colField, setColField] = useState('');
      const [valField, setValField] = useState('');
      const [aggMethod, setAggMethod] = useState('sum');
      const [pivotResult, setPivotResult] = useState(null);
      const [sortCol, setSortCol] = useState(null);
      const [sortDir, setSortDir] = useState('asc');

      useEffect(() => {
        if (categoricalColumns.length > 0 && !rowField) setRowField(categoricalColumns[0]);
        if (categoricalColumns.length > 1 && !colField) setColField(categoricalColumns[1]);
        if (numericColumns.length > 0 && !valField) setValField(numericColumns[0]);
      }, [categoricalColumns, numericColumns]);

      const generatePivot = () => {
        if (!rowField || !valField) return;
        const rowGroups = {};
        const colGroups = new Set();
        data.forEach(r => {
          const rv = r[rowField] ?? '(空)';
          const cv = colField ? (r[colField] ?? '(空)') : '(全部)';
          const v = toNumber(r[valField]);
          if (v == null) return;
          if (!rowGroups[rv]) rowGroups[rv] = {};
          if (!rowGroups[rv][cv]) rowGroups[rv][cv] = [];
          rowGroups[rv][cv].push(v);
          colGroups.add(cv);
        });
        const colKeys = [...colGroups].sort();
        const rowKeys = Object.keys(rowGroups).sort();
        const applyAgg = (arr) => {
          if (!arr || arr.length === 0) return null;
          switch (aggMethod) {
            case 'sum': return arr.reduce((a, b) => a + b, 0);
            case 'count': return arr.length;
            case 'mean': return mean(arr);
            case 'max': return Math.max(...arr);
            case 'min': return Math.min(...arr);
            default: return arr.reduce((a, b) => a + b, 0);
          }
        };
        const table = rowKeys.map(rk => {
          const row = { _row: rk };
          colKeys.forEach(ck => { row[ck] = applyAgg(rowGroups[rk][ck]); });
          row._total = applyAgg(colKeys.flatMap(ck => rowGroups[rk][ck] || []));
          return row;
        });
        setPivotResult({ table, colKeys, rowKeys });
      };

      const sortedTable = useMemo(() => {
        if (!pivotResult) return [];

      }, [pivotResult, sortCol, sortDir]);

                    {pivotResult.colKeys.map(ck => <th key={ck} onClick={() => toggleSort(ck)} style={{ cursor: 'pointer' }}>{ck} {sortCol === ck ? (sortDir === 'asc' ? '↑' : '↓') : ''}</th>)}
                    <th onClick={() => toggleSort('_total')} style={{ cursor: 'pointer', fontWeight: 700 }}>合计 {sortCol === '_total' ? (sortDir === 'asc' ? '↑' : '↓') : ''}</th>
                  </tr></thead>
                  <tbody>
